<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>キングオブキングス v6.1</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#04080f;--panel:#080e1a;--border:#162236;--text:#c8dff0;--dim:#4a6080;
  --gold:#f0c840;--red:#e74c3c;--green:#27ae60;--blue:#2980b9;
  --font:'DotGothic16','MS Gothic',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font)}
.screen{display:none;position:fixed;inset:0;flex-direction:column}
.screen.active{display:flex}

/* TITLE */
#titleScreen{align-items:center;justify-content:flex-start;overflow-y:auto;-webkit-overflow-scrolling:touch;
  background:radial-gradient(ellipse at center,#0a1525 0%,#000 100%)}
.title-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:12px;padding:24px 12px 40px;width:100%}
.title-logo{font-size:clamp(16px,4.5vw,36px);color:var(--gold);letter-spacing:3px;
  text-shadow:0 0 30px rgba(240,200,64,.7);animation:glow 3s ease-in-out infinite;text-align:center;line-height:1.5}
@keyframes glow{0%,100%{text-shadow:0 0 20px rgba(240,200,64,.7)}50%{text-shadow:0 0 50px rgba(240,200,64,1)}}
.title-sub{font-size:clamp(9px,2.5vw,11px);color:var(--dim);letter-spacing:6px}
.menu-box{background:rgba(8,14,26,.95);border:1px solid rgba(52,100,160,.5);border-radius:10px;
  padding:16px;display:flex;flex-direction:column;gap:10px;width:min(480px,96vw)}
.section-label{font-size:10px;color:rgba(140,180,220,.6);letter-spacing:2px;text-align:center;
  padding:3px 0;border-bottom:1px solid rgba(52,100,160,.3);margin-bottom:2px}
.btn{background:rgba(20,40,70,.8);border:1px solid rgba(52,100,160,.5);color:var(--text);
  font-family:var(--font);font-size:clamp(12px,3.5vw,14px);padding:10px;
  cursor:pointer;border-radius:6px;text-align:center;width:100%;min-height:44px;touch-action:manipulation}
.btn:active{background:rgba(40,80,140,.9)}
.btn-gold{border-color:rgba(240,200,64,.6);color:var(--gold);background:rgba(240,200,64,.08)}
.btn-gold:active{background:rgba(240,200,64,.2)}
.psetup-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.psetup-card{background:rgba(10,18,30,.8);border:1px solid rgba(52,100,160,.3);border-radius:7px;padding:9px}
.psetup-head{display:flex;align-items:center;gap:5px;margin-bottom:6px;font-size:11px;font-weight:bold}
.psetup-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.ai-sel{background:rgba(4,8,16,.9);border:1px solid rgba(52,100,160,.4);color:var(--text);
  font-family:var(--font);font-size:clamp(10px,2.8vw,12px);padding:5px;border-radius:4px;width:100%;outline:none;min-height:36px}
.inp{background:rgba(4,8,16,.9);border:1px solid rgba(52,100,160,.4);color:var(--text);
  font-family:var(--font);font-size:12px;padding:7px 8px;border-radius:4px;width:100%;outline:none;min-height:36px;margin-bottom:5px}
.inp:focus{border-color:rgba(240,200,64,.6)}
.note{font-size:10px;color:var(--dim);line-height:1.7;text-align:center}

/* GAME */
#gameScreen{overflow:hidden}
#gameTopBar{display:flex;align-items:center;gap:5px;background:rgba(8,14,26,.98);
  border-bottom:1px solid rgba(30,60,100,.8);padding:4px 8px;flex-shrink:0;height:44px;z-index:20}
.top-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px}
.top-turn{font-size:clamp(11px,3.5vw,14px);font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-sub{font-size:9px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-btn{background:rgba(20,40,70,.8);border:1px solid rgba(52,100,160,.5);color:var(--text);
  font-family:var(--font);font-size:clamp(10px,2.8vw,11px);padding:5px 8px;cursor:pointer;
  border-radius:5px;white-space:nowrap;min-height:32px;flex-shrink:0;touch-action:manipulation}
.top-btn:active{background:rgba(40,80,140,.9)}
.top-btn.gold{border-color:rgba(240,200,64,.6);color:var(--gold)}
.top-btn.blue{border-color:rgba(52,152,219,.6);color:#74b9e8}
.top-btn.paused{border-color:rgba(240,200,64,.8);color:var(--gold);background:rgba(240,200,64,.1)}
#gameMapArea{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;position:relative;background:#04080f;min-height:0}
#mapCanvas{display:block;touch-action:none}
#gameBotBar{display:flex;gap:4px;align-items:center;background:rgba(8,14,26,.98);
  border-top:1px solid rgba(30,60,100,.8);padding:5px 8px;flex-shrink:0;height:52px;z-index:20;
  padding-bottom:max(5px,env(safe-area-inset-bottom))}
.act-btn{flex:1;font-size:clamp(10px,2.8vw,12px);padding:7px 2px;border-radius:5px;
  border:1px solid rgba(52,100,160,.4);background:rgba(15,25,45,.8);color:var(--text);
  cursor:pointer;font-family:var(--font);min-height:38px;touch-action:manipulation}
.act-btn:active:not(:disabled){background:rgba(30,60,120,.9)}
.act-btn:disabled{opacity:.3;cursor:not-allowed}
.act-btn.atk{border-color:rgba(231,76,60,.6);color:#ff8080}
.act-btn.gold{border-color:rgba(240,200,64,.5);color:var(--gold)}

/* GAME OVER */
#gameOverScreen{align-items:center;justify-content:center;gap:16px;overflow-y:auto;padding:20px;
  background:radial-gradient(ellipse at center,#060e1c,#000)}
#goTitle{font-size:clamp(20px,6vw,36px);letter-spacing:4px;text-align:center}
#goDetail{font-size:12px;color:var(--dim)}
#goStats{background:rgba(8,14,26,.95);border:1px solid rgba(52,100,160,.4);border-radius:10px;
  padding:16px;width:min(400px,92vw);font-size:11px}
.gs-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(30,60,100,.4);gap:4px;flex-wrap:wrap}

/* MODALS */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;display:none}
.modal-bg.show{display:block}
.modal-sheet{position:fixed;bottom:0;left:0;right:0;z-index:310;
  background:rgba(8,14,26,.99);border-top:1px solid rgba(52,100,160,.5);border-radius:16px 16px 0 0;
  max-height:78vh;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);
  padding-bottom:max(12px,env(safe-area-inset-bottom))}
.modal-sheet.show{transform:translateY(0)}
.modal-handle{width:44px;height:5px;background:rgba(100,140,180,.3);border-radius:3px;margin:10px auto 7px}
.modal-header{display:flex;align-items:center;justify-content:space-between;
  padding:6px 16px 9px;border-bottom:1px solid rgba(30,60,100,.4);flex-shrink:0}
.modal-title{font-size:15px;font-weight:bold;color:var(--gold)}
.modal-close{background:rgba(20,40,70,.8);border:1px solid rgba(52,100,160,.4);color:var(--dim);
  font-family:var(--font);font-size:11px;padding:5px 14px;border-radius:5px;cursor:pointer;min-height:32px}
.modal-scroll{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;padding:12px 14px 16px}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(115px,1fr));gap:8px}
.prod-card{background:rgba(10,20,36,.9);border:1px solid rgba(52,100,160,.3);border-radius:8px;
  padding:8px 5px;cursor:pointer;font-family:var(--font);color:var(--text);
  font-size:10px;text-align:center;min-height:82px;
  display:flex;flex-direction:column;justify-content:center;touch-action:manipulation}
.prod-card:active:not(.off){background:rgba(20,50,100,.9);transform:scale(.96)}
.prod-card.off{opacity:.3;cursor:not-allowed}
.prod-sym{font-size:20px;margin-bottom:3px}
.prod-name{font-weight:bold;font-size:11px}
.prod-desc{font-size:8px;color:var(--dim);margin-top:1px;line-height:1.3}
.prod-cost{color:var(--gold);font-size:12px;margin-top:3px;font-weight:bold}
.stat-row{display:flex;justify-content:space-between;font-size:10px;color:var(--dim);padding:2px 0}
.stat-row span:last-child{color:var(--text)}
.hp-track{height:4px;background:rgba(10,20,36,.8);border-radius:2px;margin:3px 0;overflow:hidden}
.hp-fill{height:100%;border-radius:2px;transition:width .3s}
.p-row{background:rgba(8,16,30,.8);border:1px solid rgba(30,60,100,.4);border-radius:6px;padding:8px 10px;margin-bottom:6px}

/* BATTLE */
#battleScreen{position:fixed;inset:0;z-index:400;display:none;
  flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
#battleScreen.active{display:flex}
#bBG{position:absolute;inset:0;z-index:0}
#bParticleCanvas{position:absolute;inset:0;z-index:1;pointer-events:none}
.b-arena{position:relative;z-index:2;width:min(820px,100vw);
  display:flex;flex-direction:column;align-items:center;gap:clamp(5px,1.5vh,12px);padding:clamp(5px,2vw,14px)}
.b-affinity-bar{width:100%;background:rgba(0,0,0,.7);border-radius:8px;
  padding:5px 12px;display:flex;align-items:center;justify-content:center;gap:10px;
  font-size:clamp(10px,2.5vw,13px);border:1px solid rgba(255,255,255,.1)}
.b-vs-row{display:flex;align-items:center;justify-content:space-between;width:100%;gap:clamp(6px,2vw,14px)}
.b-fighter{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;min-width:0}
.b-fighter-name{font-size:clamp(10px,3vw,13px);font-weight:bold;text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%}
.b-cvs-wrap{position:relative;width:clamp(110px,24vw,200px);height:clamp(110px,24vw,200px)}
.b-cvs{display:block;width:100%;height:100%;border-radius:8px}
.b-hp-bar-bg{height:13px;background:rgba(4,8,16,.9);border:1px solid rgba(30,60,100,.6);
  border-radius:6px;overflow:hidden;position:relative;width:100%}
.b-hp-bar{height:100%;border-radius:6px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.b-hp-txt{position:absolute;right:4px;top:50%;transform:translateY(-50%);font-size:8px;color:#fff;text-shadow:0 0 4px #000}
.b-dmg-pop{position:absolute;top:8%;left:50%;transform:translateX(-50%);
  font-size:clamp(22px,6vw,40px);font-weight:bold;
  pointer-events:none;white-space:nowrap;z-index:10;display:none;
  animation:dmgPop 1.1s ease-out forwards}
@keyframes dmgPop{0%{opacity:1;transform:translateX(-50%) translateY(0) scale(1.5)}
  60%{opacity:1;transform:translateX(-50%) translateY(-40px) scale(1)}
  100%{opacity:0;transform:translateX(-50%) translateY(-80px) scale(.7)}}
.b-crit-label{position:absolute;top:58%;left:50%;transform:translateX(-50%);
  font-size:clamp(11px,3vw,17px);font-weight:bold;color:#ffee44;
  text-shadow:0 0 16px #ffaa00;pointer-events:none;white-space:nowrap;z-index:11;display:none;
  animation:critPop 1s ease-out forwards}
@keyframes critPop{0%{opacity:1;transform:translateX(-50%) scale(1.5)}100%{opacity:0;transform:translateX(-50%) scale(.8) translateY(-24px)}}
.b-vs-center{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0}
.b-vs-text{font-size:clamp(22px,6vw,36px);color:var(--gold);font-weight:bold;
  text-shadow:0 0 20px rgba(240,200,64,.9);animation:vspulse 1s ease-in-out infinite}
@keyframes vspulse{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}
.b-log{width:100%;background:rgba(2,6,14,.85);border:1px solid rgba(40,80,130,.5);
  border-radius:8px;padding:7px 12px;font-size:clamp(11px,2.8vw,13px);
  min-height:40px;line-height:1.9;text-align:center;color:var(--text)}
.b-skip{font-size:11px;padding:7px 22px;background:rgba(10,20,40,.8);
  border:1px solid rgba(80,120,160,.4);color:var(--dim);font-family:var(--font);
  border-radius:6px;cursor:pointer;min-height:36px;touch-action:manipulation}
.bgf-plain{background:linear-gradient(160deg,#0a1a06,#142608 50%,#0a1a04)}
.bgf-forest{background:linear-gradient(160deg,#020a02,#081408 50%,#020802)}
.bgf-mountain{background:linear-gradient(160deg,#120e08,#1e1808 50%,#100c06)}
.bgf-city{background:linear-gradient(160deg,#02060e,#081020 50%,#040810)}
.bgf-castle{background:linear-gradient(160deg,#060402,#10080a 50%,#060204)}
.bgf-ocean{background:linear-gradient(160deg,#020810,#041828 50%,#020810)}
.bgf-lava{background:linear-gradient(160deg,#120402,#200802 50%,#140402)}
@keyframes shakeL{0%,100%{transform:translateX(0)}25%{transform:translateX(-15px) rotate(-3deg)}75%{transform:translateX(8px) rotate(2deg)}}
@keyframes shakeR{0%,100%{transform:translateX(0)}25%{transform:translateX(15px) rotate(3deg)}75%{transform:translateX(-8px) rotate(-2deg)}}
.do-shake-l{animation:shakeL .45s ease}
.do-shake-r{animation:shakeR .45s ease}
@keyframes flashHit{0%,100%{filter:none}30%{filter:brightness(4) saturate(0)}60%{filter:brightness(2)}}
.do-flash{animation:flashHit .35s ease}
@keyframes victoryGlow{0%,100%{filter:brightness(1)}50%{filter:brightness(1.7) drop-shadow(0 0 14px gold)}}
.do-victory{animation:victoryGlow 1s ease infinite}

/* PAUSE */
#pauseOverlay{position:fixed;inset:0;z-index:390;background:rgba(0,0,0,.8);
  display:none;flex-direction:column;align-items:center;justify-content:center}
#pauseOverlay.show{display:flex}
.pause-box{background:rgba(8,16,30,.99);border:1px solid rgba(52,152,219,.5);border-radius:14px;
  padding:32px 48px;text-align:center;min-width:260px}
.pause-title{font-size:28px;color:#74b9e8;letter-spacing:5px;margin-bottom:10px}
.pause-sub{font-size:12px;color:var(--dim);margin-bottom:20px;line-height:1.8}

/* NOTIF/MSG */
#turnNotif{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.7);
  background:rgba(4,8,16,.97);border:1px solid rgba(80,140,220,.5);border-radius:12px;
  padding:14px 32px;font-size:clamp(13px,4vw,20px);letter-spacing:5px;
  display:none;z-index:500;pointer-events:none;text-align:center;
  transition:transform .25s cubic-bezier(.34,1.56,.64,1),opacity .25s;opacity:0}
#turnNotif.show{transform:translate(-50%,-50%) scale(1);opacity:1}
#msgBox{position:fixed;bottom:65px;left:50%;transform:translateX(-50%);
  background:rgba(4,8,16,.95);border:1px solid rgba(52,100,160,.5);border-radius:8px;
  padding:8px 20px;font-size:12px;display:none;z-index:600;pointer-events:none;
  max-width:90vw;text-align:center}
#msgBox.show{display:block;animation:fadeup .3s ease}
@keyframes fadeup{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
#cpuLabel{position:fixed;top:50px;left:50%;transform:translateX(-50%);
  background:rgba(4,8,16,.95);border:1px solid rgba(52,152,219,.5);border-radius:6px;
  padding:5px 16px;font-size:11px;color:#74b9e8;z-index:450;pointer-events:none;
  white-space:nowrap;display:none}
#evtPopup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(4,8,16,.98);border:1px solid rgba(240,200,64,.5);border-radius:12px;
  padding:22px 24px;z-index:550;display:none;text-align:center;width:min(340px,92vw)}
#evtPopup.show{display:block}
.evt-t{font-size:17px;color:var(--gold);margin-bottom:7px;letter-spacing:2px}
.evt-d{font-size:12px;line-height:1.8;margin-bottom:14px}
#hpTip{position:fixed;pointer-events:none;z-index:700;
  background:rgba(4,8,20,.97);border:1px solid rgba(240,200,64,.5);border-radius:7px;
  padding:7px 11px;font-size:10px;line-height:1.7;display:none;min-width:140px;max-width:190px}
#hpTip.v{display:block}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:#020408}
::-webkit-scrollbar-thumb{background:rgba(52,100,160,.4);border-radius:2px}
</style>
</head>
<body>

<!-- TITLE -->
<div id="titleScreen" class="screen active">
  <div class="title-inner">
    <div style="height:16px"></div>
    <div class="title-logo">⚔ 豊島リクエスト<br>キングオブキングス ⚔</div>
    <div class="title-sub">KINGDOM TACTICS  ver.6.1</div>
    <div class="menu-box">
      <div class="section-label">プレイ人数</div>
      <div style="display:flex;gap:7px;justify-content:center">
        <button class="btn" id="pcb2" style="width:58px;height:44px;font-size:18px" onclick="setPC(this,2)">2</button>
        <button class="btn" id="pcb3" style="width:58px;height:44px;font-size:18px" onclick="setPC(this,3)">3</button>
        <button class="btn btn-gold" id="pcb4" style="width:58px;height:44px;font-size:18px" onclick="setPC(this,4)">4</button>
      </div>
      <div class="section-label">プレイヤー設定</div>
      <div class="psetup-grid" id="pSetupGrid"></div>
      <div style="display:flex;gap:8px">
        <div style="flex:1;background:rgba(8,16,30,.8);border:1px solid rgba(52,100,160,.3);border-radius:6px;padding:8px">
          <div style="font-size:9px;color:var(--dim);margin-bottom:3px">天候</div>
          <select class="ai-sel" id="optWeather"><option value="1">あり</option><option value="0">なし</option></select>
        </div>
        <div style="flex:1;background:rgba(8,16,30,.8);border:1px solid rgba(52,100,160,.3);border-radius:6px;padding:8px">
          <div style="font-size:9px;color:var(--dim);margin-bottom:3px">イベント</div>
          <select class="ai-sel" id="optEvent"><option value="1">あり</option><option value="0">なし</option></select>
        </div>
      </div>
      <button class="btn btn-gold" onclick="startGame()">▶ ゲーム開始</button>
      <div class="note">
        <span style="color:rgba(240,200,64,.8)">重装→魔法→機動→重装 (×3倍)</span><br>
        会心10%発動・+30%ダメージ ／ CPUのみ時ポーズ可<br>
        <span style="color:rgba(100,180,255,.7)">スペースキーでポーズ</span>
      </div>
    </div>
  </div>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen">
  <div id="gameTopBar">
    <div class="top-info">
      <div id="topTurn" class="top-turn">-</div>
      <div id="topSub" class="top-sub">-</div>
    </div>
    <span id="topWeather" style="font-size:15px;flex-shrink:0"></span>
    <button id="pauseBtn" class="top-btn blue" onclick="togglePause()" style="display:none">⏸</button>
    <button id="topEndBtn" class="top-btn gold" onclick="humanEndTurn()">ターン終了</button>
  </div>
  <div id="gameMapArea"><canvas id="mapCanvas"></canvas></div>
  <div id="gameBotBar">
    <button class="act-btn atk" id="bAtk"    onclick="toggleAtkMode()" style="display:none">⚔攻撃</button>
    <button class="act-btn"     id="bWait"   onclick="doWait()"        style="display:none">⏸待機</button>
    <button class="act-btn"     id="bCancel" onclick="cancelSel()"     style="display:none">✕解除</button>
    <button class="act-btn gold" onclick="openInfoModal()">📋情報</button>
    <button class="act-btn"      onclick="openLogModal()">📜ログ</button>
  </div>
</div>

<!-- GAME OVER -->
<div id="gameOverScreen" class="screen">
  <div id="goTitle"></div>
  <div id="goDetail" style="margin-top:4px"></div>
  <div id="goStats"></div>
  <button class="btn btn-gold" onclick="showScreen('title')" style="width:min(200px,80vw)">タイトルへ</button>
</div>

<!-- PAUSE -->
<div id="pauseOverlay">
  <div class="pause-box">
    <div class="pause-title">⏸ PAUSE</div>
    <div class="pause-sub">一時停止中</div>
    <button class="btn btn-gold" onclick="togglePause()" style="width:160px;margin:0 auto">▶ 再開</button>
  </div>
</div>

<!-- PRODUCTION MODAL -->
<div class="modal-bg" id="prodBg" onclick="closeProdModal()"></div>
<div class="modal-sheet" id="prodSheet">
  <div class="modal-handle"></div>
  <div class="modal-header">
    <div class="modal-title" id="prodTitle">生産</div>
    <button class="modal-close" onclick="closeProdModal()">✕閉じる</button>
  </div>
  <div class="modal-scroll"><div class="prod-grid" id="prodGrid"></div></div>
</div>

<!-- INFO MODAL -->
<div class="modal-bg" id="infoBg" onclick="closeInfoModal()"></div>
<div class="modal-sheet" id="infoSheet">
  <div class="modal-handle"></div>
  <div class="modal-header">
    <div class="modal-title" id="infoModalTitle">情報</div>
    <button class="modal-close" onclick="closeInfoModal()">✕閉じる</button>
  </div>
  <div class="modal-scroll" id="infoContent"></div>
</div>

<!-- BATTLE -->
<div id="battleScreen">
  <div id="bBG"></div>

function getAffMult(a,d){
  var ac=TYPE_CAT[a],dc=TYPE_CAT[d];
  if(!ac||!dc) return 1;
  if((ac==='heavy'&&dc==='magic')||(ac==='magic'&&dc==='swift')||(ac==='swift'&&dc==='heavy')) return 3;
  if((ac==='magic'&&dc==='heavy')||(ac==='swift'&&dc==='magic')||(ac==='heavy'&&dc==='swift')) return 0.4;
  return 1;
}
function getAffLabel(a,d){
  var m=getAffMult(a,d);
  if(m>1) return{text:'有利 ×3！',col:'#f0c840',bg:'rgba(240,200,64,.18)'};
  if(m<1) return{text:'不利 ×0.4',col:'#e74c3c',bg:'rgba(231,76,60,.18)'};

}

var PCOLS=[

];
var AI_DEF={
  human:     {label:'人間',  badge:'👤',col:'#c8dff0'},
  aggressive:{label:'攻撃的',badge:'⚔', col:'#e74c3c'},

};

  {name:'大雨',icon:'🌧',atk:-1,mov:-1,inc:0,  def:0},

];
var RAND_EVENTS=[
  {name:'行商人来訪',fn:'evMerchant'},

// ================================================================
//  ゲーム状態
// ================================================================
var GS=null, numPl=4, pSettings=[], useWeather=true, useEvent=true;
var isPaused=false;

function newGS(np,settings){
  var gs={np:np,turn:0,round:1,players:[],units:[],uid:0,
    own:[],over:false,winner:-1,log:[],
    weather:WEATHERS[0],wTimer:3,settings:settings,
    stats:[],phxRevived:[]};
  for(var i=0;i<ROWS;i++){gs.own.push([]);for(var j=0;j<COLS;j++)gs.own[i].push(-1);}
  for(var i=0;i<np;i++){
    gs.stats.push({killed:0,lost:0,captured:0});
    gs.players.push({id:i,gold:400,alive:true,aiType:settings[i].type,name:settings[i].name,morale:100});
    gs.own[CASTLE_POS[i][0]][CASTLE_POS[i][1]]=i;
    for(var j=0;j<INIT_UNITS[i].length;j++){
      var rc=INIT_UNITS[i][j];
      if(!uAt(gs,rc[0],rc[1])) gs.units.push(mkU(gs,'soldier',i,rc[0],rc[1],true));
    }
  }
  return gs;
}
function mkU(gs,type,owner,r,c,spent){
  if(spent===undefined)spent=false;
  return{id:gs.uid++,type:type,owner:owner,row:r,col:c,
    hp:UDEFS[type].hp,mhp:UDEFS[type].hp,
    moved:spent,attacked:spent,status:[],xp:0,level:1};
}
function uAt(gs,r,c){
  for(var i=0;i<gs.units.length;i++){
    var u=gs.units[i];
    if(u.row===r&&u.col===c&&u.hp>0) return u;
  }
  return null;
}
function td(r,c){return TDEFS[MAP[r][c]];}
function isHuman(pid){return GS&&GS.players[pid]&&GS.players[pid].aiType==='human';}
function allCPU(){
  if(!GS) return false;
  var alive=GS.players.filter(function(p){return p.alive;});
  return alive.every(function(p){return p.aiType!=='human';});
}
function effAtk(u){
  var b=UDEFS[u.type].atk+(GS.weather.atk||0)+Math.round((GS.players[u.owner].morale-100)*0.05)+(u.level-1);
  if(u.status&&u.status.indexOf('cursed')>=0) b-=3;
  return Math.max(1,b);
}
function effMov(u){return Math.max(1,UDEFS[u.type].mov+(GS.weather.mov||0));}
function mdist(r1,c1,r2,c2){return Math.abs(r1-r2)+Math.abs(c1-c2);}
function critRate(u){return u.type==='assassin'?0.20:0.10;}

// ================================================================
//  移動・攻撃範囲
// ================================================================
function getMovable(gs,unit){
  var mv=effMov(unit);
  var dist={};dist[unit.row+','+unit.col]=mv;
  var q=[{r:unit.row,c:unit.col,rem:mv}];
  var res=[];
  while(q.length>0){
    var cur=q.shift();
    var r=cur.r,c=cur.c,rem=cur.rem;
    if(r!==unit.row||c!==unit.col){
      var occ=uAt(gs,r,c);
      if(!occ) res.push({r:r,c:c});
      else if(occ.owner===unit.owner){continue;}
      else{continue;}
    }
    if(rem<=0) continue;
    var dirs=[[0,1],[0,-1],[1,0],[-1,0]];
    for(var i=0;i<dirs.length;i++){
      var nr=r+dirs[i][0],nc=c+dirs[i][1];
      if(nr<0||nr>=ROWS||nc<0||nc>=COLS) continue;
      var t=td(nr,nc);
      var cost=(t.cost>=99&&unit.type==='pirate')?2:t.cost;
      if(cost>=99) continue;
      var nr2=rem-cost;if(nr2<0) continue;
      var key=nr+','+nc;
      var prev=dist[key]!==undefined?dist[key]:-1;
      if(prev>=nr2) continue;
      var occ2=uAt(gs,nr,nc);
      if(occ2&&occ2.owner!==unit.owner) continue;
      dist[key]=nr2;q.push({r:nr,c:nc,rem:nr2});
    }
  }
  return res;
}
function getAttackable(gs,unit){
  var rng=UDEFS[unit.type].rng,res=[];
  for(var dr=-rng;dr<=rng;dr++) for(var dc=-rng;dc<=rng;dc++){
    var d=Math.abs(dr)+Math.abs(dc);
    if(d===0||d>rng) continue;
    var nr=unit.row+dr,nc=unit.col+dc;
    if(nr<0||nr>=ROWS||nc<0||nc>=COLS) continue;
    var tgt=uAt(gs,nr,nc);
    if(tgt&&tgt.owner!==unit.owner) res.push({r:nr,c:nc});
  }
  return res;
}
function getRangeHexes(gs,unit){
  var rng=UDEFS[unit.type].rng,res=[];
  for(var dr=-rng;dr<=rng;dr++) for(var dc=-rng;dc<=rng;dc++){
    var d=Math.abs(dr)+Math.abs(dc);
    if(d===0||d>rng) continue;
    var nr=unit.row+dr,nc=unit.col+dc;
    if(nr<0||nr>=ROWS||nc<0||nc>=COLS) continue;
    res.push({r:nr,c:nc});
  }
  return res;
}

// ================================================================
//  戦闘ロジック
// ================================================================
function calcAttack(gs,atkId,defId){
  var atk=null,def=null;
  for(var i=0;i<gs.units.length;i++){
    if(gs.units[i].id===atkId) atk=gs.units[i];
    if(gs.units[i].id===defId) def=gs.units[i];
  }
  if(!atk||!def||atk.hp<=0||def.hp<=0) return null;
  var affMult=getAffMult(atk.type,def.type);
  var isCrit=Math.random()<critRate(atk);
  var critMult=isCrit?1.3:1.0;
  var r1=function(){return Math.floor(Math.random()*5)-2;};
  var tdef=td(def.row,def.col).def+(gs.weather.def||0);
  var rawDmg=Math.max(1,effAtk(atk)-UDEFS[def.type].def-tdef+r1());
  var dmg=Math.max(1,Math.round(rawDmg*affMult*critMult));
  def.hp-=dmg;
  // 状態異常
  if((atk.type==='necromancer'||atk.type==='witch')&&def.status.indexOf('cursed')<0&&Math.random()<(atk.type==='necromancer'?0.7:0.5))
    def.status.push('cursed');
  if(atk.type==='necromancer'&&def.status.indexOf('poisoned')<0&&Math.random()<0.5)
    def.status.push('poisoned');
  var cdmg=0,ckill=false,isCritC=false;
  var dkill=def.hp<=0;
  var phxRev=false;
  if(dkill&&UDEFS[def.type].name==='不死鳥'&&gs.phxRevived.indexOf(def.id)<0){
    def.hp=Math.floor(def.mhp*.4);gs.phxRevived.push(def.id);phxRev=true;
  }
  if(!dkill||phxRev){
    var dist=mdist(atk.row,atk.col,def.row,def.col);
    if(dist<=UDEFS[def.type].rng){
      var cAff=getAffMult(def.type,atk.type);
      isCritC=Math.random()<critRate(def);
      var cRaw=Math.max(1,effAtk(def)-UDEFS[atk.type].def+r1());
      cdmg=Math.max(1,Math.round(cRaw*cAff*(isCritC?1.3:1.0)));
      atk.hp-=cdmg;ckill=atk.hp<=0;
    }
  }
  gainXP(gs,atk,dkill&&!phxRev?30:15);
  if(!ckill) gainXP(gs,def,10);
  if(dkill&&!phxRev){
    gs.stats[atk.owner].killed++;gs.stats[def.owner].lost++;
    gs.players[atk.owner].morale=Math.min(150,gs.players[atk.owner].morale+5);
    gs.players[def.owner].morale=Math.max(50,gs.players[def.owner].morale-5);
  }
  if(ckill){gs.stats[def.owner].killed++;gs.stats[atk.owner].lost++;}
  var atkHpBef=Math.max(0,atk.hp+cdmg);
  var defHpBef=Math.max(0,def.hp+dmg);
  var res={dmg:dmg,cdmg:cdmg,dkill:dkill&&!phxRev,ckill:ckill,phxRev:phxRev,
    affMult:affMult,isCrit:isCrit,isCritC:isCritC,
    atkOwner:atk.owner,defOwner:def.owner,atkType:atk.type,defType:def.type,
    atkHpBef:atkHpBef,atkHpAft:Math.max(0,atk.hp),
    defHpBef:defHpBef,defHpAft:Math.max(0,def.hp),
    atkMhp:atk.mhp,defMhp:def.mhp,
    atkStatus:atk.status.slice(),defStatus:def.status.slice(),
    tid:MAP[def.row][def.col]};
  gs.units=gs.units.filter(function(u){return u.hp>0;});
  if(atk.hp>0){atk.moved=true;atk.attacked=true;}
  checkWin(gs);
  return res;
}
function gainXP(gs,u,amt){
  if(!u||u.hp<=0) return;
  u.xp=(u.xp||0)+amt;
  if(u.xp>=100*(u.level||1)){
    u.xp=0;u.level=(u.level||1)+1;u.mhp+=5;u.hp=Math.min(u.hp+5,u.mhp);
    addLog(PCOLS[u.owner].name+'の'+UDEFS[u.type].name+'がLv'+u.level+'に！',{sys:true});
    SFX.levelup();
  }
}
function doMove(gs,uid,r,c){
  var u=null;
  for(var i=0;i<gs.units.length;i++){if(gs.units[i].id===uid){u=gs.units[i];break;}}
  if(!u) return{captured:false};
  u.row=r;u.col=c;u.moved=true;
  var t=td(r,c);
  if(t.prod){
    var prev=gs.own[r][c];gs.own[r][c]=u.owner;
    if(prev!==u.owner){gs.stats[u.owner].captured++;return{captured:true,terrain:t};}
  }
  checkWin(gs);return{captured:false};
}
function doProd(gs,type,r,c){
  var def=UDEFS[type],pl=gs.players[gs.turn];
  if(pl.gold<def.cost||uAt(gs,r,c)) return false;
  pl.gold-=def.cost;gs.units.push(mkU(gs,type,gs.turn,r,c,true));return true;
}
function startOfTurn(gs,pid){
  var pl=gs.players[pid];var inc=0;
  for(var r=0;r<ROWS;r++) for(var c=0;c<COLS;c++){
    if(gs.own[r][c]===pid){var t=TDEFS[MAP[r][c]];if(t.incm)inc+=t.incm+(gs.weather.inc||0);}
  }
  pl.gold+=inc;
  for(var i=0;i<gs.units.length;i++){
    var u=gs.units[i];if(u.owner!==pid) continue;
    var t2=TDEFS[MAP[u.row][u.col]];
    if(t2.id===4&&u.hp<u.mhp) u.hp=Math.min(u.mhp,u.hp+Math.floor(u.mhp*.25));
    if(t2.id===7&&u.hp<u.mhp) u.hp=Math.min(u.mhp,u.hp+Math.floor(u.mhp*.15));
    if(u.status.indexOf('poisoned')>=0) u.hp=Math.max(1,u.hp-4);
    if(u.status.indexOf('cursed')>=0&&Math.random()<.3) u.status=u.status.filter(function(s){return s!=='cursed';});
  }
  // 僧侶回復
  for(var i=0;i<gs.units.length;i++){
    var h=gs.units[i];if(h.owner!==pid||h.type!=='healer') continue;
    for(var j=0;j<gs.units.length;j++){
      var a=gs.units[j];if(a.owner!==pid||a.id===h.id) continue;
      if(mdist(h.row,h.col,a.row,a.col)<=UDEFS.healer.rng&&a.hp<a.mhp)
        a.hp=Math.min(a.mhp,a.hp+Math.floor(a.mhp*.2));
    }
  }
  return inc;
}
function checkWin(gs){
  for(var p=0;p<gs.np;p++){
    if(!gs.players[p].alive) continue;
    var has=false;
    for(var r=0;r<ROWS&&!has;r++) for(var c=0;c<COLS&&!has;c++)
      if(gs.own[r][c]===p&&TDEFS[MAP[r][c]].cap) has=true;
    if(!has){
      gs.players[p].alive=false;
      addLog(gs.players[p].name+'が滅亡！',{hot:true});
      gs.units=gs.units.filter(function(u){return u.owner!==p;});
    }
  }
  var alive=gs.players.filter(function(p){return p.alive;});
  if(alive.length===1){gs.over=true;gs.winner=alive[0].id;}
}

var isMyTurn=false,cpuTurnPid=-1;

function advanceTurn(){
  if(!GS||GS.over) return;
  var next=(GS.turn+1)%GS.np,checked=0;
  while(!GS.players[next].alive&&checked<GS.np){next=(next+1)%GS.np;checked++;}
  if(checked>=GS.np) return;
  if(next<=GS.turn) GS.round++;
  GS.turn=next;
  GS.units.forEach(function(u){if(u.owner===GS.turn){u.moved=false;u.attacked=false;}});
  advWeather();
  if(GS.round%4===0) trigEvt();
  var inc=startOfTurn(GS,GS.turn);
  if(inc>0) addLog(GS.players[GS.turn].name+': +'+inc+'G',{sys:true});
  isMyTurn=isHuman(GS.turn);
  document.getElementById('pauseBtn').style.display=allCPU()?'block':'none';
  render();updUI();showTurnNotif(GS.turn);
  if(GS.over){showGameOver();return;}
  if(!isHuman(GS.turn)&&!isPaused){
    setTimeout(function(){runCPUTurn(GS.turn);},750);
  }
}
function humanEndTurn(){
  if(!GS||GS.over) return;
  if(!isMyTurn){showMsg('あなたのターンではありません');return;}
  cancelSel();SFX.turnEnd();advanceTurn();
}

function runCPUTurn(pid){
  if(cpuTurnPid>=0||isPaused) return;
  if(!GS||GS.over||GS.turn!==pid||isHuman(pid)) return;
  cpuTurnPid=pid;
  var el=document.getElementById('cpuLabel');
  el.textContent='🤖 '+GS.players[pid].name+'('+AI_DEF[GS.players[pid].aiType].label+') 思考中...';
  el.style.display='block';
  cpuProduceAll(pid,function(){
    var unitIds=GS.units.filter(function(u){return u.owner===pid&&u.hp>0;}).map(function(u){return u.id;});
    cpuActSeq(pid,unitIds,0,function(){
      el.style.display='none';
      cpuTurnPid=-1;
      SFX.turnEnd();
      setTimeout(function(){if(!isPaused)advanceTurn();},250);
    });
  });
}
function cpuProduceAll(pid,cb){
  if(!GS||GS.over||GS.turn!==pid){cb();return;}
  var cnt=GS.units.filter(function(u){return u.owner===pid;}).length;
  if(cnt<12){
    var at=GS.players[pid].aiType;
    for(var r=0;r<ROWS;r++) for(var c=0;c<COLS;c++){
      if(GS.own[r][c]===pid&&td(r,c).prod&&!uAt(GS,r,c)){
        var type=cpuPickProd(pid,at);
        if(type&&doProd(GS,type,r,c)){
          addLog(GS.players[pid].name+'が'+UDEFS[type].name+'を生産',{cpu:true});SFX.produce();
        }
      }
    }
    render();updUI();
  }
  setTimeout(cb,80);
}
function cpuActSeq(pid,unitIds,idx,done){
  if(isPaused){setTimeout(function(){cpuActSeq(pid,unitIds,idx,done);},300);return;}
  if(!GS||GS.over||GS.turn!==pid||idx>=unitIds.length){done();return;}
  var u=null;
  for(var i=0;i<GS.units.length;i++){if(GS.units[i].id===unitIds[idx]){u=GS.units[i];break;}}
  if(!u||u.hp<=0||u.owner!==pid||(u.moved&&u.attacked)){
    setTimeout(function(){cpuActSeq(pid,unitIds,idx+1,done);},0);return;
  }
  cpuActOne(pid,u,function(){
    setTimeout(function(){cpuActSeq(pid,unitIds,idx+1,done);},100);
  });
}
function cpuActOne(pid,u,cb){
  if(!u||u.hp<=0){cb();return;}
  var at=GS.players[pid].aiType;
  // 移動前攻撃チェック
  if(!u.attacked){
    var tgts=getAttackable(GS,u);
    if(tgts.length>0){
      var best=cpuBestTarget(tgts,at,u);
      if(best){
        var d=uAt(GS,best.r,best.c);
        if(d){cpuExecAtk(u,d,function(){u.moved=true;u.attacked=true;cb();});return;}
      }
    }
  }
  // 移動
  if(!u.moved){
    var movs=getMovable(GS,u);
    var dest=cpuBestDest(movs,pid,at,u);
    if(dest){
      var res=doMove(GS,u.id,dest.r,dest.c);
      if(res.captured){addLog(GS.players[pid].name+'の'+UDEFS[u.type].name+'が'+res.terrain.name+'を占領！',{cpu:true});SFX.capture();}
      render();updUI();
    }
    // 移動後攻撃
    if(!u.attacked){
      var tgts2=getAttackable(GS,u);
      if(tgts2.length>0){
        var best2=cpuBestTarget(tgts2,at,u);
        if(best2){
          var d2=uAt(GS,best2.r,best2.c);
          if(d2){cpuExecAtk(u,d2,function(){u.moved=true;u.attacked=true;cb();});return;}
        }
      }
    }
  }
  u.moved=true;u.attacked=true;cb();
}
function cpuExecAtk(atk,def,cb){
  if(!atk||!def||atk.hp<=0||def.hp<=0){cb();return;}
  var res=calcAttack(GS,atk.id,def.id);
  if(!res){cb();return;}
  var m=GS.players[atk.owner].name+'の'+UDEFS[atk.type].name+'→'+UDEFS[def.type].name+'(-'+res.dmg+')';
  if(res.isCrit) m+='💥会心';if(res.affMult>=3) m+='[×3有利]';
  if(res.dkill) m+='【撃破】';if(res.cdmg>0) m+=' 反撃-'+res.cdmg+(res.ckill?'【撃破】':'');
  addLog(m,{hot:true});
  showBattle(res,function(){render();updUI();if(GS.over)showGameOver();else cb();});
}
function cpuBestTarget(targets,at,atkU){
  return targets.reduce(function(best,t){
    var u=uAt(GS,t.r,t.c);if(!u) return best;
    var bu=best?uAt(GS,best.r,best.c):null;if(!bu) return t;
    var sc=cpuTargetScore(u,atkU,at),bsc=cpuTargetScore(bu,atkU,at);
    return sc>bsc?t:best;
  },null);
}
function cpuTargetScore(def,atk,at){
  var sc=0;
  var aff=getAffMult(atk.type,def.type);
  if(aff>=3) sc+=100;else if(aff<=0.4) sc-=80;
  sc+=(1-def.hp/def.mhp)*70;
  if(TDEFS[MAP[def.row][def.col]].cap) sc+=150;
  if(TDEFS[MAP[def.row][def.col]].prod) sc+=60;
  if(at==='aggressive') sc+=(def.mhp-def.hp)*.5;
  if(at==='cautious') sc+=(10-UDEFS[def.type].def)*4;
  if(at==='genius'){var exp=Math.max(1,effAtk(atk)*aff-UDEFS[def.type].def);sc+=exp>=def.hp?120:exp*1.5;}
  return sc;
}
function cpuBestDest(movs,pid,at,u){
  if(!movs||!movs.length) return null;
  var ecs=[],ncs=[];
  for(var r=0;r<ROWS;r++) for(var c=0;c<COLS;c++){
    var ow=GS.own[r][c],t=TDEFS[MAP[r][c]];
    if(t.cap&&ow>=0&&ow!==pid) ecs.push({r:r,c:c});
    if(t.prod&&!t.cap&&ow!==pid&&!uAt(GS,r,c)) ncs.push({r:r,c:c});
  }
  return movs.reduce(function(best,m){
    var sc=0;var t=TDEFS[MAP[m.r][m.c]],mow=GS.own[m.r][m.c];
    if(t.cap&&mow!==pid) sc+=500;
    if(t.prod&&!t.cap&&mow!==pid) sc+=200;
    sc+=t.def*4;
    if(ecs.length){var mn=999;for(var i=0;i<ecs.length;i++)mn=Math.min(mn,mdist(m.r,m.c,ecs[i].r,ecs[i].c));sc+=(22-mn)*(at==='aggressive'?10:7);}
    if(ncs.length){var mn2=999;for(var i=0;i<ncs.length;i++)mn2=Math.min(mn2,mdist(m.r,m.c,ncs[i].r,ncs[i].c));sc+=(14-mn2)*5;}
    if(at==='cautious'&&u.hp<u.mhp*.4) sc+=t.def*10;
    if(at==='genius'){
      var inRng=0;
      for(var i=0;i<GS.units.length;i++){var x=GS.units[i];if(x.owner!==pid&&x.hp>0&&mdist(m.r,m.c,x.row,x.col)===UDEFS[u.type].rng)inRng++;}
      sc+=inRng*28;
    }
    if(!best||sc>best.sc) return Object.assign({},m,{sc:sc});
    return best;
  },null);
}
function cpuPickProd(pid,at){
  var cnt=GS.units.filter(function(u){return u.owner===pid;}).length;if(cnt>=12) return null;
  var gold=GS.players[pid].gold;
  var aff=Object.entries(UDEFS).filter(function(e){return gold>=e[1].cost;}).sort(function(a,b){return b[1].cost-a[1].cost;});
  if(!aff.length) return null;
  if(at==='aggressive'){
    if(GS.round<=2){var f=aff.find(function(e){return ['knight','berserker'].indexOf(e[0])>=0;});if(f)return f[0];return aff.find(function(e){return e[0]==='soldier';})?'soldier':aff[aff.length-1][0];}
    if(GS.round<=4){var f2=aff.find(function(e){return ['assassin','ninja','dragon','valkyrie'].indexOf(e[0])>=0;});if(f2)return f2[0];}
    return aff[0][0];
  }
  if(at==='cautious'){
    var prefs=['titan','golem','paladin','knight','healer','soldier'];
    for(var i=0;i<prefs.length;i++) if(aff.some(function(e){return e[0]===prefs[i];})) return prefs[i];
    return aff[aff.length-1][0];
  }
  // genius
  var enemies=GS.units.filter(function(u){return u.owner!==pid&&u.hp>0;});
  if(enemies.length){
    var cats={heavy:0,magic:0,swift:0};
    enemies.forEach(function(e){var cc=TYPE_CAT[e.type];if(cc)cats[cc]++;});
    var dom=Object.entries(cats).sort(function(a,b){return b[1]-a[1];})[0][0];
    var counter={heavy:'swift',magic:'heavy',swift:'magic'}[dom];
    var cu=aff.find(function(e){return TYPE_CAT[e[0]]===counter;});if(cu)return cu[0];
  }
  var rng=aff.find(function(e){return ['arcanelord','catapult','mage','archer'].indexOf(e[0])>=0;});
  if(rng)return rng[0];
  return aff[0][0];
}

var _ac=null;
function getAC(){
  if(!_ac){try{_ac=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  return _ac;
}
function beep(f,d,t,v,det){
  t=t||'sine';v=v||.22;det=det||0;
  try{var ac=getAC();if(!ac)return;var o=ac.createOscillator(),g=ac.createGain();
    o.type=t;o.frequency.value=f;o.detune.value=det;
    g.gain.setValueAtTime(v,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.0001,ac.currentTime+d);
    o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d);}catch(e){}
}
function noise(d,v){v=v||.12;
  try{var ac=getAC();if(!ac)return;var buf=ac.createBuffer(1,ac.sampleRate*d,ac.sampleRate);
    var da=buf.getChannelData(0);for(var i=0;i<da.length;i++)da[i]=Math.random()*2-1;
    var s=ac.createBufferSource(),g=ac.createGain();s.buffer=buf;
    g.gain.setValueAtTime(v,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.0001,ac.currentTime+d);
    s.connect(g);g.connect(ac.destination);s.start();s.stop(ac.currentTime+d);}catch(e){}
}

  select:function(){beep(440,.08,'square',.18);setTimeout(function(){beep(660,.1,'square',.13);},55);},

  kill:function(){noise(.1,.35);beep(90,.25,'sawtooth',.25);},
  capture:function(){for(var i=0;i<3;i++)(function(ii){setTimeout(function(){beep(520+ii*110,.14,'square',.18);},ii*90);})(i);},
  turnEnd:function(){beep(440,.1,'sine',.16);setTimeout(function(){beep(660,.18,'sine',.12);},150);},

  levelup:function(){var ns=[523,659,784,880,1047,1318];ns.forEach(function(f,i){setTimeout(function(){beep(f,.16,'sine',.18);},i*65);});},

var pCanvas,pCtx,particles=[],pRaf=null;
function initPCanvas(){
  pCanvas=document.getElementById('bParticleCanvas');

function spawnParticles(x,y,col,count,type){
  count=count||24;type=type||'hit';
  for(var i=0;i<count;i++){
    var a=Math.random()*Math.PI*2,sp=(type==='magic'?6:9)*Math.random()+2;
    var sz=type==='magic'?Math.random()*10+4:Math.random()*8+2;
    particles.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,sz:sz,col:col,alpha:1,type:type,decay:type==='magic'?.013:.022});
  }

function spawnExplosion(x,y,col){
  for(var i=0;i<60;i++){
    var a=Math.random()*Math.PI*2,sp=Math.random()*15+5;
    var cols=[col,'#ffffff','#ffff44','#ff8800'];
    particles.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-4,sz:Math.random()*12+4,
      col:cols[Math.floor(Math.random()*cols.length)],alpha:1,type:'exp',decay:.016});
  }
}
function spawnCrit(x,y){
  for(var i=0;i<80;i++){
    var a=Math.random()*Math.PI*2,sp=Math.random()*18+6;
    var cols=['#ffee44','#ffcc00','#ff8800','#ffffff','#ffaaaa'];
    particles.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-5,sz:Math.random()*14+5,
      col:cols[Math.floor(Math.random()*cols.length)],alpha:1,type:'crit',decay:.012});
  }

function tickParticles(){
  if(!pCtx) return;
  pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
  particles=particles.filter(function(p){
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.25;p.vx*=0.94;p.alpha-=p.decay;
    if(p.alpha<=0) return false;
    pCtx.save();pCtx.globalAlpha=p.alpha;
    if(p.type==='magic'||p.type==='crit'){
      var g=pCtx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.sz);
      g.addColorStop(0,'#ffffff');g.addColorStop(.4,p.col);g.addColorStop(1,'transparent');
      pCtx.fillStyle=g;
    }else{pCtx.fillStyle=p.col;}
    pCtx.beginPath();pCtx.arc(p.x,p.y,p.sz,0,Math.PI*2);pCtx.fill();pCtx.restore();
    return true;
  });
}
function startPLoop(){

  function loop(){
    tickParticles();
    if(particles.length>0||document.getElementById('battleScreen').classList.contains('active')){
      pRaf=requestAnimationFrame(loop);
    }else{pRaf=null;}
  }
  pRaf=requestAnimationFrame(loop);
}

function drawSprite(cvs,type,col,flip){
  var c=cvs.getContext('2d'),w=cvs.width,h=cvs.height;
  c.clearRect(0,0,w,h);c.save();
  if(flip){c.translate(w,0);c.scale(-1,1);}
  // 影
  c.fillStyle='rgba(0,0,0,.35)';c.beginPath();c.ellipse(w*.5,h*.92,w*.38,h*.06,0,0,Math.PI*2);c.fill();
  // 本体（グラデーション+シンボル）
  var gr=c.createRadialGradient(w*.42,h*.36,8,w*.5,h*.5,w*.44);
  gr.addColorStop(0,col+'ee');gr.addColorStop(1,col+'33');
  c.fillStyle=gr;c.beginPath();c.arc(w*.5,h*.5,w*.42,0,Math.PI*2);c.fill();
  c.strokeStyle='rgba(255,255,255,.45)';c.lineWidth=2;c.stroke();
  // ハイライト
  var hg=c.createLinearGradient(w*.28,h*.2,w*.72,h*.5);
  hg.addColorStop(0,'rgba(255,255,255,.22)');hg.addColorStop(1,'rgba(255,255,255,0)');
  c.fillStyle=hg;c.beginPath();c.arc(w*.5,h*.5,w*.42,0,Math.PI*2);c.fill();
  // シンボル
  c.fillStyle='rgba(255,255,255,.95)';
  c.font='bold '+Math.floor(w*.28)+'px DotGothic16,monospace';
  c.textAlign='center';c.textBaseline='middle';
  c.shadowColor='rgba(0,0,0,.7)';c.shadowBlur=4;
  c.fillText(UDEFS[type]?UDEFS[type].sym:'?',w*.5,h*.5);
  c.shadowBlur=0;
  // タイプ別装飾
  var catCol={heavy:'#e74c3c',magic:'#9b59b6',swift:'#27ae60'};
  var cat=TYPE_CAT[type];
  if(cat){
    c.strokeStyle=catCol[cat]||col;c.lineWidth=3;
    c.beginPath();c.arc(w*.5,h*.5,w*.44,0,Math.PI*2);c.stroke();
  }
  // 追加装飾
  if(type==='dragon'){
    c.fillStyle='rgba(255,100,0,.6)';
    c.beginPath();c.moveTo(w*.16,h*.38);c.lineTo(w*.02,h*.5);c.lineTo(w*.16,h*.62);c.closePath();c.fill();
  }
  if(type==='phoenix'){
    c.fillStyle='rgba(255,200,0,.5)';
    c.beginPath();c.moveTo(w*.5,h*.06);c.lineTo(w*.1,h*.35);c.lineTo(w*.5,h*.35);c.closePath();c.fill();
    c.beginPath();c.moveTo(w*.5,h*.06);c.lineTo(w*.9,h*.35);c.lineTo(w*.5,h*.35);c.closePath();c.fill();
  }
  if(type==='arcanelord'||type==='mage'){
    var mg=c.createRadialGradient(w*.74,h*.28,2,w*.74,h*.28,13);
    mg.addColorStop(0,'rgba(255,255,255,.9)');mg.addColorStop(1,'rgba(160,50,255,0)');
    c.fillStyle=mg;c.beginPath();c.arc(w*.74,h*.28,13,0,Math.PI*2);c.fill();
  }
  if(type==='titan'||type==='golem'){
    c.strokeStyle='rgba(255,150,0,.5)';c.lineWidth=2;
    c.beginPath();c.arc(w*.5,h*.5,w*.35,0,Math.PI*2);c.stroke();
  }
  if(type==='assassin'){
    c.fillStyle='rgba(150,0,200,.4)';
    for(var i=1;i<=3;i++){c.save();c.translate(-i*6,i*3);c.beginPath();c.arc(w*.5,h*.5,w*.2,0,Math.PI*2);c.fill();c.restore();}
  }
  c.restore();
}

var bgMap={0:'bgf-plain',1:'bgf-forest',2:'bgf-mountain',3:'bgf-water',4:'bgf-city',5:'bgf-castle',6:'bgf-ocean',7:'bgf-lava'};
var bDoneCallback=null,bSkipped=false;

function showBattle(res,onDone){
  bDoneCallback=onDone;bSkipped=false;particles=[];
  var bs=document.getElementById('battleScreen');
  document.getElementById('bBG').className=bgMap[res.tid]||'bgf-plain';
  var apc=PCOLS[res.atkOwner],dpc=PCOLS[res.defOwner];
  var apn=(GS&&GS.players[res.atkOwner])?GS.players[res.atkOwner].name:'?';
  var dpn=(GS&&GS.players[res.defOwner])?GS.players[res.defOwner].name:'?';
  document.getElementById('bLName').textContent=apn+'の'+UDEFS[res.atkType].name;
  document.getElementById('bLName').style.color=apc.light;
  document.getElementById('bRName').textContent=dpn+'の'+UDEFS[res.defType].name;
  document.getElementById('bRName').style.color=dpc.light;
  drawSprite(document.getElementById('bLCvs'),res.atkType,apc.main,false);
  drawSprite(document.getElementById('bRCvs'),res.defType,dpc.main,true);
  setBBar('bL',res.atkHpBef,res.atkMhp);setBBar('bR',res.defHpBef,res.defMhp);
  var aff=getAffLabel(res.atkType,res.defType);
  var abEl=document.getElementById('bAffBar');abEl.style.background=aff.bg;
  var catN={heavy:'重装',magic:'魔法',swift:'機動'};
  document.getElementById('bAffinityTxt').innerHTML=
    '<span style="color:'+apc.light+'">'+catN[TYPE_CAT[res.atkType]]+'</span>&ensp;'+
    '<span style="color:'+aff.col+';font-weight:bold">'+aff.text+'</span>&ensp;'+
    '<span style="color:'+dpc.light+'">'+catN[TYPE_CAT[res.defType]]+'</span>';
  clearDmgEl();
  document.getElementById('bLog').textContent='準備...';
  document.getElementById('bRoundLbl').textContent='ROUND '+(GS?GS.round:1);
  document.getElementById('bLStatus').textContent=statusTxt(res.atkStatus||[]);
  document.getElementById('bRStatus').textContent=statusTxt(res.defStatus||[]);
  bs.classList.add('active');startPLoop();
  if(res.affMult>1) SFX.advantage();
  setTimeout(function(){bStep1(res);},380);
}
function bStep1(res){
  if(bSkipped){hideBattle();return;}
  if(res.isCrit) SFX.crit(); else SFX.sfxFor(res.atkType);
  var lWrap=document.getElementById('bLWrap'),rCvs=document.getElementById('bRCvs');
  lWrap.classList.remove('do-shake-l');void lWrap.offsetWidth;lWrap.classList.add('do-shake-l');
  rCvs.classList.remove('do-flash');void rCvs.offsetWidth;rCvs.classList.add('do-flash');
  var rRect=document.getElementById('bRWrap').getBoundingClientRect();
  var px=rRect.left+rRect.width/2,py=rRect.top+rRect.height/2;
  var isMagic=['mage','witch','arcanelord','necromancer','phoenix'].indexOf(res.atkType)>=0;
  if(res.isCrit){spawnCrit(px,py);spawnExplosion(px,py,'#ffee44');}
  else{spawnParticles(px,py,PCOLS[res.atkOwner].main,28,isMagic?'magic':'hit');if(res.dkill)spawnExplosion(px,py,'#ff6600');}
  var dmgCol=res.isCrit?'#ffee44':(res.affMult>=3?'#ff8800':'#ff5555');
  showDmgEl('bRDmg','-'+res.dmg+(res.isCrit?'！':''),dmgCol);
  setBBar('bR',res.defHpAft,res.defMhp);
  if(res.isCrit){
    var ce=document.getElementById('bRCrit');ce.style.display='block';
    ce.style.animation='none';ce.offsetHeight;ce.style.animation='critPop 1s ease-out forwards';
    setTimeout(function(){ce.style.display='none';},1000);
  }
  var m=UDEFS[res.atkType].name+'の攻撃！ '+res.dmg+'ダメージ！';
  if(res.isCrit) m+=' 💥会心！(+30%)';
  if(res.affMult>=3) m+=' ⭐3倍有利！';else if(res.affMult<=0.4) m+=' ▼不利×0.4';
  if(res.dkill) m+=' 💀撃破！';if(res.phxRev) m+=' 🔥不死鳥復活！';
  document.getElementById('bLog').textContent=m;
  if(res.dkill) SFX.kill();
  var next=(!res.dkill&&res.cdmg>0)?700:1100;
  setTimeout(function(){bStep2(res);},next);
}
function bStep2(res){
  if(bSkipped){hideBattle();return;}
  if(!res.dkill&&res.cdmg>0){
    if(res.isCritC) SFX.crit(); else SFX.sfxFor(res.defType);
    var rWrap=document.getElementById('bRWrap'),lCvs=document.getElementById('bLCvs');
    rWrap.classList.remove('do-shake-r');void rWrap.offsetWidth;rWrap.classList.add('do-shake-r');
    lCvs.classList.remove('do-flash');void lCvs.offsetWidth;lCvs.classList.add('do-flash');
    var lRect=document.getElementById('bLWrap').getBoundingClientRect();
    var cpx=lRect.left+lRect.width/2,cpy=lRect.top+lRect.height/2;
    var isCMagic=['mage','witch','arcanelord','necromancer','phoenix'].indexOf(res.defType)>=0;
    if(res.isCritC){spawnCrit(cpx,cpy);}else spawnParticles(cpx,cpy,PCOLS[res.defOwner].main,28,isCMagic?'magic':'hit');
    if(res.ckill) spawnExplosion(cpx,cpy,'#ff6600');
    showDmgEl('bLDmg','-'+res.cdmg+(res.isCritC?'！':''),res.isCritC?'#ffee44':'#ff5555');
    setBBar('bL',res.atkHpAft,res.atkMhp);
    if(res.isCritC){
      var ce2=document.getElementById('bLCrit');ce2.style.display='block';
      ce2.style.animation='none';ce2.offsetHeight;ce2.style.animation='critPop 1s ease-out forwards';
      setTimeout(function(){ce2.style.display='none';},1000);
    }
    var m2=UDEFS[res.defType].name+'の反撃！ '+res.cdmg+'ダメージ！';
    if(res.isCritC) m2+=' 💥会心！';if(res.ckill) m2+=' 💀撃破！';
    document.getElementById('bLog').textContent=m2;
    if(res.ckill) SFX.kill();
    setTimeout(function(){bEnd(res);},900);
  } else {bEnd(res);}
}
function bEnd(res){
  if(bSkipped){hideBattle();return;}
  if(res.dkill&&!res.phxRev) document.getElementById('bLCvs').classList.add('do-victory');
  else if(res.ckill) document.getElementById('bRCvs').classList.add('do-victory');
  setTimeout(function(){if(!bSkipped)hideBattle();},1000);
}
function hideBattle(){
  document.getElementById('battleScreen').classList.remove('active');
  ['bLCvs','bRCvs'].forEach(function(id){
    var e=document.getElementById(id);e.style.filter='';e.classList.remove('do-victory');
  });
  particles=[];
  var cb=bDoneCallback;bDoneCallback=null;if(cb)cb();
}
function skipBattle(){bSkipped=true;hideBattle();}
function setBBar(side,hp,mhp){
  var p=Math.max(0,hp/mhp*100);
  var bar=document.getElementById(side+'Bar'),txt=document.getElementById(side+'Txt');
  bar.style.width=p+'%';bar.style.background=p>60?'#27ae60':p>30?'#e8a020':'#c0392b';
  txt.textContent=Math.max(0,hp)+'/'+mhp;
}
function showDmgEl(id,txt,col){
  col=col||'#ff5555';
  var el=document.getElementById(id);el.textContent=txt;el.style.color=col;
  el.style.textShadow='0 0 20px '+col;
  el.style.display='block';el.style.animation='none';el.offsetHeight;
  el.style.animation='dmgPop 1.1s ease-out forwards';
  setTimeout(function(){el.style.display='none';},1100);
}
function clearDmgEl(){
  ['bLDmg','bRDmg'].forEach(function(id){var e=document.getElementById(id);e.style.display='none';e.style.animation='none';});
}
function statusTxt(st){
  if(!st||!st.length) return '';
  return st.map(function(s){return s==='cursed'?'💜呪い':s==='poisoned'?'🟢毒':'⚡'+s;}).join(' ');
}

var canvas,ctx,selU=null,movH=[],atkH=[],rngH=[],gMode='select',hoverC=null;
var rafId=null,glowT=0,touchSX=0,touchSY=0;

function setupEvents(){
  canvas.addEventListener('touchstart',function(e){touchSX=e.touches[0].clientX;touchSY=e.touches[0].clientY;},{passive:true});
  canvas.addEventListener('touchend',function(e){
    var dx=Math.abs(e.changedTouches[0].clientX-touchSX),dy=Math.abs(e.changedTouches[0].clientY-touchSY);
    if(dx>10||dy>10) return;e.preventDefault();
    onTap({clientX:e.changedTouches[0].clientX,clientY:e.changedTouches[0].clientY});
  },{passive:false});
  canvas.addEventListener('mousemove',function(e){
    var cell=toRC(e);hoverC=cell.r>=0?cell:null;
    if(hoverC){var u=uAt(GS,hoverC.r,hoverC.c);if(u)showHpTip(u,e.clientX,e.clientY);else hideHpTip();}
    else hideHpTip();
  });
  canvas.addEventListener('mouseleave',function(){hideHpTip();hoverC=null;});
  canvas.addEventListener('click',onTap);
}
function onTap(e){
  if(!GS||GS.over||isPaused) return;
  if(!isMyTurn){showMsg('相手のターンです');return;}
  var rc=toRC(e);var r=rc.r,c=rc.c;if(r<0) return;
  if(gMode==='select')      handleSel(r,c);
  else if(gMode==='moving') handleMov(r,c);
  else if(gMode==='attack') handleAtk(r,c);
}
function toRC(e){
  var rect=canvas.getBoundingClientRect(),scale=canvas.width/(rect.width||1);
  var cc=Math.floor((e.clientX-rect.left)*scale/TW),rr=Math.floor((e.clientY-rect.top)*scale/TH);
  return{r:(rr>=0&&rr<ROWS?rr:-1),c:(cc>=0&&cc<COLS?cc:-1)};
}
function handleSel(r,c){
  if(!isHuman(GS.turn)) return;
  var u=uAt(GS,r,c),t=td(r,c),cur=GS.turn;
  if(u&&u.owner===cur&&!u.moved){selU=u;movH=getMovable(GS,u);atkH=getAttackable(GS,u);rngH=getRangeHexes(GS,u);gMode='moving';SFX.select();}
  else if(u&&u.owner===cur&&u.moved&&!u.attacked){selU=u;movH=[];atkH=getAttackable(GS,u);rngH=getRangeHexes(GS,u);gMode='attack';SFX.select();}
  else if(t.prod&&GS.own[r][c]===cur&&!uAt(GS,r,c)){openProdModal(r,c);return;}
  else cancelSel();
  render();updUI();
}
function handleMov(r,c){
  if(!selU) return;
  if(atkH.some(function(h){return h.r===r&&h.c===c;})){var d=uAt(GS,r,c);if(d){humanAttack(selU,d);return;}}
  if(movH.some(function(h){return h.r===r&&h.c===c;})){
    var res=doMove(GS,selU.id,r,c);
    if(res.captured){addLog(UDEFS[selU.type].name+'が'+res.terrain.name+'を占領！',{hot:true});SFX.capture();}else SFX.move();
    atkH=getAttackable(GS,selU);rngH=getRangeHexes(GS,selU);
    if(atkH.length){gMode='attack';movH=[];}else cancelSel();
  }else if(r===selU.row&&c===selU.col){cancelSel();}
  else{cancelSel();handleSel(r,c);return;}
  render();updUI();
}
function handleAtk(r,c){
  if(!selU) return;
  if(atkH.some(function(h){return h.r===r&&h.c===c;})){var d=uAt(GS,r,c);if(d){humanAttack(selU,d);return;}}
  cancelSel();render();updUI();
}
function humanAttack(atk,def){
  cancelSel();
  var res=calcAttack(GS,atk.id,def.id);
  if(!res){render();updUI();return;}
  var m=GS.players[atk.owner].name+'の'+UDEFS[atk.type].name+'→'+UDEFS[def.type].name+'(-'+res.dmg+')';
  if(res.isCrit) m+='💥';if(res.affMult>=3) m+='[×3有利]';if(res.dkill) m+='【撃破】';
  if(res.cdmg>0) m+=' 反撃-'+res.cdmg+(res.ckill?'【撃破】':'');
  addLog(m,{hot:true});
  if(GS.over) showBattle(res,function(){showGameOver();});
  else showBattle(res,function(){render();updUI();});
}
function toggleAtkMode(){if(!selU)return;atkH=getAttackable(GS,selU);rngH=getRangeHexes(GS,selU);movH=[];gMode='attack';render();updUI();}
function doWait(){if(!selU)return;selU.moved=true;selU.attacked=true;addLog(UDEFS[selU.type].name+'が待機');cancelSel();render();updUI();}
function cancelSel(){selU=null;movH=[];atkH=[];rngH=[];gMode='select';render();updUI();}

function openProdModal(r,c){
  document.getElementById('prodTitle').textContent=td(r,c).name+'で生産';
  var grid=document.getElementById('prodGrid');grid.innerHTML='';
  var gold=GS.players[GS.turn].gold;
  var catN={heavy:'[重装]',magic:'[魔法]',swift:'[機動]'};
  var catC={heavy:'#e74c3c',magic:'#9b59b6',swift:'#27ae60'};
  Object.entries(UDEFS).forEach(function(entry){
    var type=entry[0],def=entry[1];
    var ok=gold>=def.cost&&!uAt(GS,r,c);
    var btn=document.createElement('button');
    btn.className='prod-card'+(ok?'':' off');
    btn.innerHTML='<div class="prod-sym">'+def.sym+'</div>'
      +'<div class="prod-name">'+def.name+'</div>'
      +'<div class="prod-desc">'+def.desc+'</div>'
      +'<div style="font-size:8px;color:'+(catC[def.cat]||'#888')+'">'+(catN[def.cat]||'')+'</div>'
      +'<div class="prod-cost">'+def.cost+'G</div>';
    if(ok)(function(t,d){btn.addEventListener('click',function(){
      if(doProd(GS,t,r,c)){addLog(GS.players[GS.turn].name+'が'+d.name+'を生産(-'+d.cost+'G)',{sys:true});SFX.produce();closeProdModal();render();updUI();}
    });})(type,def);
    grid.appendChild(btn);
  });
  document.getElementById('prodBg').classList.add('show');
  document.getElementById('prodSheet').classList.add('show');
}
function closeProdModal(){document.getElementById('prodBg').classList.remove('show');document.getElementById('prodSheet').classList.remove('show');}

      +'<div style="font-size:9px;color:var(--dim);margin-bottom:4px">HP '+selU.hp+'/'+selU.mhp+'</div>'

  rafId=requestAnimationFrame(loop);
}
function stopRAF(){if(rafId){cancelAnimationFrame(rafId);rafId=null;}}

function render(){
  if(!ctx||!GS) return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(var r=0;r<ROWS;r++) for(var c=0;c<COLS;c++) drawTile(r,c);
  drawRangeOv();
  if(gMode==='moving'||gMode==='attack') drawHL();
  GS.units.filter(function(u){return u.hp>0;}).forEach(function(u){drawUnit(u);});
  if(hoverC&&hoverC.r>=0){
    ctx.strokeStyle='rgba(180,220,255,.35)';ctx.lineWidth=2;
    ctx.strokeRect(hoverC.c*TW+1,hoverC.r*TH+1,TW-2,TH-2);
  }
  drawGrid();
}

function drawRangeOv(){
  if(!rngH.length) return;
  var a=.1+.06*Math.sin(glowT*.004);
  for(var i=0;i<rngH.length;i++){
    var r=rngH[i].r,c=rngH[i].c;
    ctx.fillStyle='rgba(240,60,60,'+a+')';ctx.fillRect(c*TW,r*TH,TW,TH);
    ctx.save();ctx.strokeStyle='rgba(255,100,60,'+(0.4+0.16*Math.sin(glowT*.004))+')';
    ctx.lineWidth=1.5;ctx.setLineDash([4,3]);ctx.lineDashOffset=-(glowT*.04%7);
    ctx.strokeRect(c*TW+1,r*TH+1,TW-2,TH-2);ctx.restore();
  }
}

var TILE_LABEL={4:'都',5:'城',6:'港',7:'神'};
function drawTile(r,c){
  var tid=MAP[r][c],t=TDEFS[tid],x=c*TW,y=r*TH;
  // ベース
  var bg=ctx.createLinearGradient(x,y,x+TW,y+TH);
  bg.addColorStop(0,t.col);bg.addColorStop(1,shadeCol(t.col,-20));
  ctx.fillStyle=bg;ctx.fillRect(x,y,TW,TH);
  // 所有権
  var ow=GS.own[r][c];
  if(ow>=0&&t.prod){
    ctx.fillStyle=PCOLS[ow].main+'35';ctx.fillRect(x,y,TW,TH);
    ctx.fillStyle=PCOLS[ow].main;
    ctx.beginPath();ctx.moveTo(x+3,y+2);ctx.lineTo(x+13,y+2);ctx.lineTo(x+3,y+11);ctx.fill();
  }
  ctx.textAlign='center';ctx.textBaseline='bottom';
  if(TILE_LABEL[tid]){
    var lc=ow>=0?PCOLS[ow].light:(tid===5?'#e8c060':tid===7?'#c888ff':tid===6?'#80d0ff':'#ccc');
    ctx.fillStyle=lc;ctx.font='bold 11px DotGothic16,monospace';
    ctx.shadowColor='rgba(0,0,0,.8)';ctx.shadowBlur=4;
    ctx.fillText(TILE_LABEL[tid],x+TW/2,y+TH-2);ctx.shadowBlur=0;
  } else if(tid===2){
    ctx.fillStyle='rgba(200,180,130,.55)';ctx.beginPath();ctx.moveTo(x+TW/2,y+5);ctx.lineTo(x+TW-5,y+TH-5);ctx.lineTo(x+5,y+TH-5);ctx.closePath();ctx.fill();
  } else if(tid===1){
    ctx.fillStyle='rgba(30,90,20,.75)';
    for(var i=0;i<3;i++){var tx=x+8+i*13,ty=y+7+(i%2)*8;ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(tx+6,ty+10);ctx.lineTo(tx-6,ty+10);ctx.closePath();ctx.fill();}
  } else if(tid===3){
    ctx.strokeStyle='rgba(80,160,255,.2)';ctx.lineWidth=1.5;
    for(var i=0;i<3;i++){ctx.beginPath();ctx.moveTo(x+2,y+7+i*11);ctx.bezierCurveTo(x+12,y+3+i*11,x+24,y+11+i*11,x+TW-2,y+7+i*11);ctx.stroke();}
  }
  if(t.incm&&ow>=0){
    ctx.font='7px monospace';ctx.textAlign='right';ctx.fillStyle='rgba(240,220,80,.8)';
    ctx.fillText(t.incm,x+TW-1,y+TH-1);
  }
  ctx.textAlign='left';ctx.setLineDash([]);
}

function shadeCol(hex,amt){
  var n=parseInt(hex.replace('#',''),16);
  var r=Math.max(0,Math.min(255,((n>>16)&0xff)+amt));
  var g=Math.max(0,Math.min(255,((n>>8)&0xff)+amt));
  var b=Math.max(0,Math.min(255,(n&0xff)+amt));
  return '#'+((1<<24)|(r<<16)|(g<<8)|b).toString(16).slice(1);
}

function drawHL(){
  for(var i=0;i<movH.length;i++){
    var r=movH[i].r,c=movH[i].c;
    ctx.fillStyle='rgba(40,100,220,.22)';ctx.fillRect(c*TW,r*TH,TW,TH);
    ctx.strokeStyle='rgba(80,160,255,.7)';ctx.lineWidth=1.5;ctx.strokeRect(c*TW+1,r*TH+1,TW-2,TH-2);
  }
  for(var i=0;i<atkH.length;i++){
    var r=atkH[i].r,c=atkH[i].c;
    ctx.fillStyle='rgba(220,40,40,.28)';ctx.fillRect(c*TW,r*TH,TW,TH);
    ctx.strokeStyle='rgba(255,80,60,.85)';ctx.lineWidth=2;ctx.strokeRect(c*TW+1,r*TH+1,TW-2,TH-2);
    ctx.font='14px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='rgba(255,120,80,.75)';ctx.fillText('⚔',c*TW+TW/2,r*TH+TH/2);
  }
  if(selU){
    var p=.65+.35*Math.sin(glowT*.007);
    ctx.save();ctx.strokeStyle='rgba(255,224,96,'+p+')';ctx.lineWidth=3;
    ctx.shadowColor='rgba(255,200,60,'+(p*.7)+')';ctx.shadowBlur=8;
    ctx.strokeRect(selU.col*TW+1,selU.row*TH+1,TW-2,TH-2);ctx.restore();
  }
}

var CAT_COL={heavy:'#e74c3c',magic:'#9b59b6',swift:'#27ae60'};
function drawUnit(u){
  var x=u.col*TW,y=u.row*TH;
  var def=UDEFS[u.type],pc=PCOLS[u.owner];
  var cx=x+TW/2,cy=y+TH/2,rad=13;
  // 影
  ctx.fillStyle='rgba(0,0,0,.38)';ctx.beginPath();ctx.ellipse(cx+2,cy+rad*.75+2,rad*.7,rad*.2,0,0,Math.PI*2);ctx.fill();
  // 本体
  var gr=ctx.createRadialGradient(cx-3,cy-3,2,cx,cy,rad);
  gr.addColorStop(0,pc.light+(u.moved?'88':'ee'));gr.addColorStop(1,(u.moved?pc.dark:pc.main)+(u.moved?'66':'dd'));
  ctx.save();
  if(!u.moved){ctx.shadowColor=pc.main+'66';ctx.shadowBlur=u===selU?12:4;}
  ctx.beginPath();ctx.arc(cx,cy,rad,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();
  var catC=CAT_COL[def.cat]||pc.main;
  ctx.strokeStyle=u===selU?'#ffe060':(u.moved?'rgba(80,100,120,.45)':catC+'bb');
  ctx.lineWidth=u===selU?3:2;ctx.stroke();ctx.restore();
  // シンボル
  ctx.fillStyle=u.moved?'rgba(200,210,220,.42)':'rgba(255,255,255,.95)';
  ctx.font='bold 12px DotGothic16,monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor='rgba(0,0,0,.7)';ctx.shadowBlur=3;
  ctx.fillText(def.sym,cx,cy);ctx.shadowBlur=0;
  // レベルバッジ
  if((u.level||1)>1){
    ctx.fillStyle='rgba(0,0,0,.75)';ctx.beginPath();ctx.arc(cx+rad-1,cy-rad+1,5.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffd700';ctx.font='bold 7px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(u.level,cx+rad-1,cy-rad+1);
  }
  // 状態
  if(u.status&&u.status.indexOf('cursed')>=0){ctx.fillStyle='rgba(150,0,200,.9)';ctx.beginPath();ctx.arc(cx-rad+1,cy-rad+1,4,0,Math.PI*2);ctx.fill();}
  if(u.status&&u.status.indexOf('poisoned')>=0){ctx.fillStyle='rgba(0,200,80,.9)';ctx.beginPath();ctx.arc(cx+rad-1,cy+rad-1,4,0,Math.PI*2);ctx.fill();}
  // HPバー
  var hp=u.hp/u.mhp,bx=x+3,by=y+TH-5,bw=TW-6,bh=3.5;
  ctx.fillStyle='rgba(0,0,0,.62)';ctx.fillRect(bx,by,bw,bh);
  var hpC=hp>.6?'#27ae60':hp>.3?'#e8a020':'#c0392b';
  ctx.fillStyle=hpC;ctx.fillRect(bx,by,bw*hp,bh);
  // AIバッジ
  if(GS.players[u.owner].aiType!=='human'){
    var aiT=AI_DEF[GS.players[u.owner].aiType];
    ctx.fillStyle='rgba(0,0,0,.75)';ctx.fillRect(x+TW-12,y,12,11);
    ctx.fillStyle=aiT.col;ctx.font='8px serif';ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(aiT.badge,x+TW-6,y+1);
  }
}

function drawGrid(){
  ctx.strokeStyle='rgba(0,0,0,.18)';ctx.lineWidth=.6;
  for(var c=0;c<=COLS;c++){ctx.beginPath();ctx.moveTo(c*TW,0);ctx.lineTo(c*TW,ROWS*TH);ctx.stroke();}
  for(var r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*TH);ctx.lineTo(COLS*TW,r*TH);ctx.stroke();}
}

// ================================================================
//  UI
// ================================================================
function updUI(){
  if(!GS) return;
  var cur=GS.turn,pl=GS.players[cur],pc=PCOLS[cur],aiT=AI_DEF[pl.aiType]||AI_DEF.human;
  document.getElementById('topTurn').textContent=aiT.badge+' '+pl.name;
  document.getElementById('topTurn').style.color=pc.light;
  var mm={select:'ユニット/施設をタップ',moving:'移動先をタップ',attack:'攻撃対象をタップ（赤）',produce:'生産選択中'};
  document.getElementById('topSub').textContent='第'+GS.round+'R ／ '+(mm[gMode]||'');
  document.getElementById('topWeather').textContent=useWeather?GS.weather.icon:'';
  var etb=document.getElementById('topEndBtn');
  etb.style.opacity=isMyTurn?'1':'.4';
  etb.textContent=isMyTurn?'ターン終了':(cpuTurnPid>=0?'CPU中…':'待機中');
  var showAct=selU&&(gMode==='moving'||gMode==='attack')&&isHuman(cur);
  document.getElementById('bAtk').style.display=showAct?'flex':'none';
  document.getElementById('bWait').style.display=showAct?'flex':'none';
  document.getElementById('bCancel').style.display=showAct?'flex':'none';
  if(showAct) document.getElementById('bAtk').disabled=selU.attacked||!getAttackable(GS,selU).length;
  var pb=document.getElementById('pauseBtn');
  pb.style.display=allCPU()?'block':'none';
  if(isPaused){pb.textContent='▶';pb.classList.add('paused');}
  else{pb.textContent='⏸';pb.classList.remove('paused');}
}

function showHpTip(u,x,y){
  var def=UDEFS[u.type],pc=PCOLS[u.owner];
  var hp=u.hp,mhp=u.mhp,p=Math.floor(hp/mhp*100);
  var col=p>60?'#27ae60':p>30?'#f39c12':'#c0392b';
  var catN={heavy:'重装',magic:'魔法',swift:'機動'},catC={heavy:'#e74c3c',magic:'#9b59b6',swift:'#27ae60'};
  document.getElementById('hpTip').innerHTML=
    '<div style="color:'+pc.light+';font-weight:bold">'+GS.players[u.owner].name+'の'+def.name+'</div>'
    +'<div style="color:'+(catC[def.cat]||'#888')+';font-size:9px">['+( catN[def.cat]||'?')+']</div>'
    +'<div style="color:'+col+'">HP '+hp+'/'+mhp+' ('+p+'%)</div>'
    +'<div style="background:rgba(4,8,16,.8);height:4px;border-radius:2px;overflow:hidden;margin:3px 0;width:120px">'
    +'<div style="height:100%;width:'+p+'%;background:'+col+';border-radius:2px"></div></div>'
    +'<div style="color:var(--dim);font-size:9px">ATK:'+effAtk(u)+' DEF:'+def.def+' Lv:'+u.level+'</div>'
    +'<div style="color:var(--dim);font-size:9px">会心:'+Math.round(critRate(u)*100)+'%</div>';
  document.getElementById('hpTip').classList.add('v');
  var tx=x+14,ty=y+14;
  if(tx+190>window.innerWidth) tx=x-195;
  if(ty+115>window.innerHeight) ty=y-120;
  document.getElementById('hpTip').style.left=tx+'px';
  document.getElementById('hpTip').style.top=ty+'px';
}
function hideHpTip(){document.getElementById('hpTip').classList.remove('v');}

function addLog(msg,opt){
  opt=opt||{};if(!GS) return;
  GS.log.unshift({msg:msg,hot:!!opt.hot,sys:!!opt.sys,cpu:!!opt.cpu});
  if(GS.log.length>60) GS.log.pop();
}
function showTurnNotif(pid){
  var n=document.getElementById('turnNotif'),pc=PCOLS[pid];
  var pl=GS.players[pid],aiT=AI_DEF[pl.aiType]||AI_DEF.human;
  n.style.color=pc.light;n.style.borderColor=pc.main+'88';
  n.textContent=aiT.badge+' '+pl.name+'のターン';
  n.style.display='block';
  setTimeout(function(){n.classList.add('show');},10);
  setTimeout(function(){n.classList.remove('show');setTimeout(function(){n.style.display='none';},250);},1900);
}
function showMsg(msg,dur){
  dur=dur||2200;
  var m=document.getElementById('msgBox');m.textContent=msg;m.classList.add('show');
  clearTimeout(m._t);m._t=setTimeout(function(){m.classList.remove('show');},dur);
}
function showEvt(t,d){
  document.getElementById('evtTitle').textContent=t;document.getElementById('evtDesc').textContent=d;
  document.getElementById('evtPopup').classList.add('show');
  addLog('【イベント】'+t+': '+d,{sys:true});
}
function closeEvt(){document.getElementById('evtPopup').classList.remove('show');}

function showGameOver(){
  if(!GS) return;SFX.victory();
  var wid=GS.winner,pc=PCOLS[wid],wpl=GS.players[wid];
  document.getElementById('goTitle').style.color=pc.light;
  document.getElementById('goTitle').textContent='⚔ '+wpl.name+' 勝利！';
  document.getElementById('goDetail').textContent='第'+GS.round+'ラウンド終了';
  var st=document.getElementById('goStats');
  st.innerHTML='<div style="font-size:9px;color:rgba(140,180,220,.6);letter-spacing:2px;margin-bottom:8px">FINAL RESULTS</div>';
  for(var i=0;i<GS.np;i++){
    var pl=GS.players[i],pcc=PCOLS[i],s=GS.stats[i];
    var castles=0,cities=0;
    for(var r=0;r<ROWS;r++) for(var c=0;c<COLS;c++){
      if(GS.own[r][c]===i){if(TDEFS[MAP[r][c]].cap)castles++;else if(TDEFS[MAP[r][c]].prod)cities++;}
    }
    var row=document.createElement('div');row.className='gs-row';
    var aiT=AI_DEF[pl.aiType]||AI_DEF.human;
    row.innerHTML='<span style="color:'+pcc.light+'">'+aiT.badge+pl.name+'</span>'
      +'<span>'+(pl.alive?'✓':'✕')+'</span>'
      +'<span>🏯'+castles+'🏙'+cities+'</span>'
      +'<span>⚔撃破'+s.killed+'</span>'
      +'<span>💰'+pl.gold+'G</span>';
    st.appendChild(row);
  }
  stopRAF();setTimeout(function(){showScreen('gameover');},400);
}

// ================================================================
//  タイトル設定
// ================================================================
function setPC(btn,n){
  numPl=n;
  ['pcb2','pcb3','pcb4'].forEach(function(id){
    var b=document.getElementById(id);
    b.style.borderColor='rgba(52,100,160,.5)';b.style.color='var(--text)';b.classList.remove('btn-gold');
  });
  btn.style.borderColor='rgba(240,200,64,.6)';btn.style.color='var(--gold)';btn.classList.add('btn-gold');
  for(var i=0;i<n;i++) if(!pSettings[i]) pSettings[i]={type:i===0?'human':'genius',name:''};
  buildPSetup();
}
function buildPSetup(){
  var g=document.getElementById('pSetupGrid');g.innerHTML='';
  for(var i=0;i<numPl;i++){
    var pc=PCOLS[i];
    if(!pSettings[i]) pSettings[i]={type:i===0?'human':'genius',name:''};
    var s=pSettings[i];
    var div=document.createElement('div');div.className='psetup-card';
    div.style.borderColor=pc.main+'44';
    div.innerHTML='<div class="psetup-head"><div class="psetup-dot" style="background:'+pc.main+'"></div><span style="color:'+pc.light+'">'+pc.name+'</span></div>'
      +'<input class="inp" placeholder="名前(省略可)" value="'+(s.name||'')+'" maxlength="10">'
      +'<select class="ai-sel">'
      +'<option value="human"'+(s.type==='human'?' selected':'')+'>👤 人間</option>'
      +'<option value="aggressive"'+(s.type==='aggressive'?' selected':'')+'>⚔ CPU攻撃的</option>'
      +'<option value="cautious"'+(s.type==='cautious'?' selected':'')+'>🛡 CPU慎重</option>'
      +'<option value="genius"'+(s.type==='genius'?' selected':'')+'>🧠 CPU頭脳</option>'
      +'</select>';
    (function(idx,div2){
      div2.querySelector('input').addEventListener('input',function(){pSettings[idx].name=this.value;});
      div2.querySelector('select').addEventListener('change',function(){pSettings[idx].type=this.value;});
    })(i,div);
    g.appendChild(div);
  }
}

function startGame(){
  try{getAC()&&getAC().resume();}catch(e){}
  var settings=[];
  for(var i=0;i<numPl;i++){
    var s=pSettings[i]||{type:i===0?'human':'genius',name:''};
    var cards=document.querySelectorAll('#pSetupGrid .psetup-card');
    var inp=cards[i]?cards[i].querySelector('input'):null;
    var sel=cards[i]?cards[i].querySelector('select'):null;
    var nm=(inp?inp.value.trim():'')||(s.type==='human'?'P'+(i+1):PCOLS[i].name);
    var tp=sel?sel.value:(s.type||'genius');
    settings.push({type:tp,name:nm});
  }
  useWeather=document.getElementById('optWeather').value==='1';
  useEvent  =document.getElementById('optEvent').value==='1';
  GS=newGS(numPl,settings);
  isMyTurn=isHuman(0);cpuTurnPid=-1;isPaused=false;
  bDoneCallback=null;bSkipped=false;particles=[];
  initCanvas();showScreen('game');
  var inc=startOfTurn(GS,0);
  if(inc>0) addLog(GS.players[0].name+': +'+inc+'G',{sys:true});
  addLog('ゲーム開始！ '+numPl+'人対戦',{sys:true});
  document.getElementById('topWeather').textContent=useWeather?GS.weather.icon:'';
  document.getElementById('pauseBtn').style.display=allCPU()?'block':'none';
  render();updUI();showTurnNotif(0);
  if(!isHuman(0)) setTimeout(function(){runCPUTurn(0);},900);
}

function initCanvas(){
  var area=document.getElementById('gameMapArea');
  var old=document.getElementById('mapCanvas');
  var cvs=document.createElement('canvas');
  cvs.id='mapCanvas';cvs.style.display='block';cvs.style.touchAction='none';
  old.replaceWith(cvs);
  canvas=cvs;canvas.width=COLS*TW;canvas.height=ROWS*TH;
  ctx=canvas.getContext('2d');
  area.scrollTop=0;area.scrollLeft=0;
  setupEvents();
}

function showScreen(name){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  var ids={title:'titleScreen',game:'gameScreen',gameover:'gameOverScreen'};
  var el=document.getElementById(ids[name]);if(el)el.classList.add('active');
  if(name==='game') startRAF(); else stopRAF();
}

// 星エフェクト
function createStars(){
  var c=document.getElementById('starsContainer');
  if(!c) return;
  for(var i=0;i<60;i++){
    var s=document.createElement('div');s.className='star';
    var sz=Math.random()*2.5+.5;
    s.style.cssText='width:'+sz+'px;height:'+sz+'px;top:'+(Math.random()*100)+'%;left:'+(Math.random()*100)+'%;'
      +'animation-delay:'+(Math.random()*4)+'s;animation-duration:'+(2+Math.random()*5)+'s';
    c.appendChild(s);
  }
}

window.addEventListener('DOMContentLoaded',function(){
  createStars();
  for(var i=0;i<numPl;i++) pSettings[i]={type:i===0?'human':'genius',name:''};
  buildPSetup();
  initPCanvas();
  document.addEventListener('keydown',function(e){
    if(!GS||GS.over) return;
    if(e.key==='Escape') cancelSel();
    if(e.key==='Enter'&&!e.repeat&&isMyTurn) humanEndTurn();
    if(e.key===' '){e.preventDefault();if(allCPU())togglePause();}
  });
  document.addEventListener('pointerdown',function(){
    try{getAC()&&getAC().resume();}catch(e){}
  },{once:true});
});
</script>
