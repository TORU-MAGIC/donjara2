<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>⚔ キングオブキングス v8.0</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>
<style>
:root{--bg:#03060d;--panel:#060c18;--bdr:#1a3050;--text:#c8dff0;--dim:#4a6080;--gold:#f0c840;--red:#e74c3c;--green:#27ae60;--blue:#3498db;--font:'DotGothic16','MS Gothic',monospace;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font)}
.screen{display:none;position:fixed;inset:0;flex-direction:column}
.screen.active{display:flex}
#titleScreen{align-items:center;justify-content:flex-start;overflow-y:auto;-webkit-overflow-scrolling:touch;background:radial-gradient(ellipse at 50% 30%,#0d1e3a 0%,#000 100%)}
#starsCanvas{position:fixed;top:0;left:0;z-index:0;pointer-events:none}
.ti{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:10px;padding:20px 12px 60px;width:100%;max-width:540px;margin:0 auto}
.t-logo{font-size:clamp(20px,5.5vw,38px);color:var(--gold);letter-spacing:4px;text-align:center;text-shadow:0 0 40px rgba(240,200,64,.9);animation:glow 3s ease-in-out infinite;line-height:1.5}
.t-ver{font-size:10px;color:var(--dim);letter-spacing:6px;margin-top:2px}
@keyframes glow{0%,100%{text-shadow:0 0 20px rgba(240,200,64,.7)}50%{text-shadow:0 0 60px rgba(240,200,64,1),0 0 100px rgba(240,160,0,.5)}}
.mbox{background:rgba(6,12,24,.97);border:1px solid rgba(52,100,160,.5);border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:9px;width:100%}
.slabel{font-size:9px;color:rgba(140,180,220,.55);letter-spacing:2px;text-align:center;padding:3px 0;border-bottom:1px solid rgba(52,100,160,.25);margin-bottom:1px}
.btn{background:rgba(18,36,64,.8);border:1px solid rgba(52,100,160,.5);color:var(--text);font-family:var(--font);font-size:clamp(11px,3.2vw,14px);padding:9px;cursor:pointer;border-radius:6px;text-align:center;width:100%;min-height:42px;touch-action:manipulation}
.btn:active{background:rgba(40,80,140,.9);transform:scale(.98)}
.btn-gold{border-color:rgba(240,200,64,.6);color:var(--gold);background:rgba(240,200,64,.07)}
.btn-blue{border-color:rgba(52,152,219,.6);color:#74b9e8;background:rgba(52,152,219,.08)}
.btn-red{border-color:rgba(231,76,60,.5);color:#ff8080;background:rgba(231,76,60,.07)}
.prow{display:flex;gap:6px}
.pcb{flex:1;border:1px solid rgba(52,100,160,.4);background:rgba(10,20,40,.8);color:var(--dim);font-family:var(--font);font-size:16px;padding:7px;border-radius:6px;cursor:pointer;text-align:center;min-height:40px;touch-action:manipulation;transition:.2s}
.pcb.sel{border-color:rgba(240,200,64,.7);color:var(--gold);background:rgba(240,200,64,.12)}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.pcard{background:rgba(8,16,30,.85);border:1px solid rgba(52,100,160,.3);border-radius:8px;padding:8px 7px}
.phead{display:flex;align-items:center;gap:5px;margin-bottom:5px;font-size:11px;font-weight:bold}
.pdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.sel2{background:rgba(4,8,16,.9);border:1px solid rgba(52,100,160,.4);color:var(--text);font-family:var(--font);font-size:clamp(9px,2.6vw,12px);padding:5px;border-radius:4px;width:100%;outline:none;min-height:34px}
.inp{background:rgba(4,8,16,.9);border:1px solid rgba(52,100,160,.4);color:var(--text);font-family:var(--font);font-size:13px;padding:6px 8px;border-radius:4px;width:100%;outline:none;min-height:34px;margin-bottom:4px}
.inp:focus{border-color:rgba(240,200,64,.6)}
.code-d{font-size:clamp(30px,10vw,50px);color:var(--gold);letter-spacing:10px;text-align:center;text-shadow:0 0 20px rgba(240,200,64,.8);padding:10px 0;font-weight:bold}
.code-i{background:rgba(4,8,16,.9);border:2px solid rgba(52,100,160,.5);color:var(--gold);font-family:var(--font);font-size:32px;padding:8px;border-radius:6px;width:100%;outline:none;text-align:center;letter-spacing:8px;min-height:52px}
.code-i:focus{border-color:rgba(240,200,64,.7)}
.rpl{background:rgba(4,8,16,.8);border:1px solid rgba(52,100,160,.3);border-radius:6px;padding:8px;min-height:60px;font-size:11px}
.note{font-size:9px;color:var(--dim);line-height:1.7;text-align:center}
/* GAME */
#gameScreen{overflow:hidden}
#gameTopBar{display:flex;align-items:center;gap:4px;background:rgba(4,8,20,.99);border-bottom:1px solid rgba(30,60,100,.9);padding:3px 8px;flex-shrink:0;height:44px;z-index:20}
.tinfo{flex:1;min-width:0}
.tturn{font-size:clamp(11px,3.5vw,14px);font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tsub{font-size:9px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbtn{background:rgba(18,36,64,.8);border:1px solid rgba(52,100,160,.5);color:var(--text);font-family:var(--font);font-size:clamp(9px,2.6vw,11px);padding:4px 7px;cursor:pointer;border-radius:5px;white-space:nowrap;min-height:32px;flex-shrink:0;touch-action:manipulation}
.tbtn:active{background:rgba(40,80,140,.9)}
.tbtn.gold{border-color:rgba(240,200,64,.6);color:var(--gold)}
.tbtn.paused{border-color:rgba(240,200,64,.8);color:var(--gold);background:rgba(240,200,64,.1)}
#gameMapArea{flex:1;overflow:scroll;-webkit-overflow-scrolling:touch;position:relative;background:#020408;min-height:0}
#mapCanvas{display:block;touch-action:none}
#minimap{position:absolute;top:4px;right:4px;border:1px solid rgba(52,100,160,.5);border-radius:4px;background:rgba(2,4,10,.9);z-index:10;cursor:pointer;opacity:.85}
#gameBotBar{display:flex;gap:3px;align-items:center;background:rgba(4,8,20,.99);border-top:1px solid rgba(30,60,100,.9);padding:4px 6px;flex-shrink:0;min-height:50px;z-index:20;flex-wrap:wrap;padding-bottom:max(4px,env(safe-area-inset-bottom))}
.abtn{flex:1;min-width:52px;font-size:clamp(9px,2.6vw,11px);padding:5px 2px;border-radius:5px;border:1px solid rgba(52,100,160,.4);background:rgba(12,22,42,.8);color:var(--text);cursor:pointer;font-family:var(--font);min-height:36px;touch-action:manipulation;text-align:center}
.abtn:active:not(:disabled){background:rgba(28,56,110,.9)}
.abtn:disabled{opacity:.28;cursor:not-allowed}
.abtn.atk{border-color:rgba(231,76,60,.6);color:#ff8080}
.abtn.gold{border-color:rgba(240,200,64,.5);color:var(--gold)}
.abtn.magic{border-color:rgba(155,89,182,.6);color:#cc88ff}
.abtn.summon{border-color:rgba(80,200,120,.6);color:#80ffaa}
/* GAME OVER */
#gameOverScreen{align-items:center;justify-content:center;gap:14px;overflow-y:auto;padding:20px;background:radial-gradient(ellipse at center,#060e1c,#000)}
#goTitle{font-size:clamp(22px,6vw,38px);letter-spacing:4px;text-align:center}
#goStats{background:rgba(6,12,24,.95);border:1px solid rgba(52,100,160,.4);border-radius:10px;padding:14px;width:min(420px,94vw);font-size:11px}
.gsrow{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(30,60,100,.3);gap:4px;flex-wrap:wrap}
/* MODALS */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:300;display:none}
.mbg.show{display:block}
.msheet{position:fixed;bottom:0;left:0;right:0;z-index:310;background:rgba(6,12,24,.99);border-top:1px solid rgba(52,100,160,.5);border-radius:16px 16px 0 0;max-height:82vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);padding-bottom:max(12px,env(safe-area-inset-bottom))}
.msheet.show{transform:translateY(0)}
.mhandle{width:44px;height:5px;background:rgba(100,140,180,.28);border-radius:3px;margin:9px auto 6px}
.mhdr{display:flex;align-items:center;justify-content:space-between;padding:5px 14px 8px;border-bottom:1px solid rgba(30,60,100,.35);flex-shrink:0}
.mtitle{font-size:14px;font-weight:bold;color:var(--gold)}
.mclose{background:rgba(18,36,64,.8);border:1px solid rgba(52,100,160,.4);color:var(--dim);font-family:var(--font);font-size:11px;padding:4px 12px;border-radius:5px;cursor:pointer;min-height:30px}
.mscroll{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;padding:10px 12px 14px}
.pgrid2{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:7px}
.pcard2{background:rgba(8,18,34,.9);border:1px solid rgba(52,100,160,.3);border-radius:8px;padding:7px 4px;cursor:pointer;font-family:var(--font);color:var(--text);font-size:10px;text-align:center;min-height:80px;display:flex;flex-direction:column;justify-content:center;touch-action:manipulation}
.pcard2:active:not(.off){background:rgba(18,46,96,.9);transform:scale(.96)}
.pcard2.off{opacity:.28;cursor:not-allowed}
.psym{font-size:20px;margin-bottom:2px}
.pname{font-weight:bold;font-size:10px}
.pdesc{font-size:7px;color:var(--dim);margin-top:1px;line-height:1.3}
.pcost{color:var(--gold);font-size:11px;margin-top:2px;font-weight:bold}
.prow2{display:flex;justify-content:space-between;font-size:10px;color:var(--dim);padding:2px 0}
.prow2 span:last-child{color:var(--text)}
.prow3{background:rgba(6,14,28,.8);border:1px solid rgba(28,56,96,.4);border-radius:6px;padding:7px 9px;margin-bottom:5px}
/* PAUSE */
#pauseOv{position:fixed;inset:0;z-index:390;background:rgba(0,0,0,.82);display:none;flex-direction:column;align-items:center;justify-content:center}
#pauseOv.show{display:flex}
.pausebox{background:rgba(6,14,28,.99);border:1px solid rgba(52,152,219,.5);border-radius:14px;padding:28px 44px;text-align:center;min-width:240px}
/* BATTLE */
#battleScreen{position:fixed;inset:0;z-index:400;display:none;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
#battleScreen.active{display:flex}
#bBGCanvas{position:absolute;inset:0;z-index:0}
#bParticleCanvas{position:absolute;inset:0;z-index:1;pointer-events:none}
.b-arena{position:relative;z-index:2;width:min(860px,100vw);display:flex;flex-direction:column;align-items:center;gap:clamp(4px,1.2vh,10px);padding:clamp(4px,2vw,12px)}
.b-topbar{width:100%;display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,.65);border-radius:8px;padding:5px 12px;border:1px solid rgba(255,255,255,.08)}
.b-aff{font-size:clamp(10px,2.4vw,13px);font-weight:bold}
.b-round{font-size:clamp(9px,2vw,11px);color:var(--dim);letter-spacing:2px}
.b-vsrow{display:flex;align-items:flex-end;justify-content:center;width:100%;gap:clamp(8px,3vw,20px)}
.b-fighter{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;max-width:240px}
.b-fname{font-size:clamp(9px,2.8vw,12px);font-weight:bold;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%}
.b-hpwrap{width:100%}
.b-hpbg{height:16px;background:rgba(4,8,20,.95);border:1px solid rgba(30,60,100,.7);border-radius:8px;overflow:hidden;position:relative}
.b-hpbar{height:100%;border-radius:8px;transition:width .7s cubic-bezier(.4,0,.2,1)}
.b-hptxt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;text-shadow:0 0 6px #000;font-weight:bold}
.b-cvswrap{position:relative;width:clamp(120px,28vw,210px);height:clamp(120px,28vw,210px)}
.b-cvs{display:block;width:100%;height:100%;border-radius:10px}
.b-dmg{position:absolute;top:5%;left:50%;transform:translateX(-50%);font-size:clamp(24px,7vw,44px);font-weight:bold;pointer-events:none;white-space:nowrap;z-index:10;display:none;animation:dmgPop 1.2s ease-out forwards}
@keyframes dmgPop{0%{opacity:1;transform:translateX(-50%) translateY(0) scale(1.8)}40%{opacity:1;transform:translateX(-50%) translateY(-30px) scale(1.1)}100%{opacity:0;transform:translateX(-50%) translateY(-90px) scale(.6)}}
.b-crit{position:absolute;top:52%;left:50%;transform:translateX(-50%);font-size:clamp(11px,3vw,15px);font-weight:bold;color:#ffee44;text-shadow:0 0 20px #ffaa00;pointer-events:none;white-space:nowrap;z-index:11;display:none;animation:critPop 1s ease-out forwards}
@keyframes critPop{0%{opacity:1;transform:translateX(-50%) scale(1.8)}100%{opacity:0;transform:translateX(-50%) scale(.7) translateY(-30px)}}
.b-stat{font-size:9px;color:var(--dim);text-align:center;min-height:14px}
.b-vsc{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.b-vstxt{font-size:clamp(24px,7vw,42px);color:var(--gold);font-weight:bold;text-shadow:0 0 24px rgba(240,200,64,.9);animation:vspulse 1.2s ease-in-out infinite}
@keyframes vspulse{0%,100%{transform:scale(1)}50%{transform:scale(1.22)}}
.b-log{width:100%;background:rgba(2,6,18,.88);border:1px solid rgba(40,80,130,.5);border-radius:8px;padding:7px 12px;font-size:clamp(11px,2.7vw,13px);min-height:38px;line-height:1.9;text-align:center}
.b-skip{font-size:11px;padding:6px 20px;background:rgba(8,18,38,.8);border:1px solid rgba(80,120,160,.4);color:var(--dim);font-family:var(--font);border-radius:6px;cursor:pointer;min-height:34px;touch-action:manipulation}
@keyframes shakeL{0%,100%{transform:translateX(0)}25%{transform:translateX(-18px) rotate(-4deg)}75%{transform:translateX(10px) rotate(2deg)}}
@keyframes shakeR{0%,100%{transform:translateX(0)}25%{transform:translateX(18px) rotate(4deg)}75%{transform:translateX(-10px) rotate(-2deg)}}
.do-shake-l{animation:shakeL .45s ease}
.do-shake-r{animation:shakeR .45s ease}
@keyframes flashHit{0%,100%{filter:none}25%{filter:brightness(5) saturate(0)}60%{filter:brightness(2) hue-rotate(30deg)}}
.do-flash{animation:flashHit .38s ease}
@keyframes vicGlow{0%,100%{filter:brightness(1)}50%{filter:brightness(1.9) drop-shadow(0 0 18px gold)}}
.do-victory{animation:vicGlow 1.1s ease infinite}
/* NOTIF */
#turnNotif{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.7);background:rgba(4,8,20,.98);border:2px solid rgba(80,140,220,.5);border-radius:12px;padding:14px 32px;font-size:clamp(14px,4.5vw,22px);letter-spacing:5px;display:none;z-index:500;pointer-events:none;text-align:center;transition:transform .25s cubic-bezier(.34,1.56,.64,1),opacity .25s;opacity:0}
#turnNotif.show{transform:translate(-50%,-50%) scale(1);opacity:1}
#msgBox{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:rgba(4,8,20,.96);border:1px solid rgba(52,100,160,.5);border-radius:8px;padding:8px 18px;font-size:12px;display:none;z-index:600;pointer-events:none;max-width:92vw;text-align:center}
#msgBox.show{display:block;animation:fadeup .3s ease}
@keyframes fadeup{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
#cpuLabel{position:fixed;top:48px;left:50%;transform:translateX(-50%);background:rgba(4,8,20,.96);border:1px solid rgba(52,152,219,.5);border-radius:6px;padding:4px 14px;font-size:11px;color:#74b9e8;z-index:450;pointer-events:none;display:none;white-space:nowrap}
#evtPopup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(4,8,20,.99);border:1px solid rgba(240,200,64,.55);border-radius:12px;padding:20px 22px;z-index:550;display:none;text-align:center;width:min(340px,92vw)}
#evtPopup.show{display:block}
.evt-t{font-size:16px;color:var(--gold);margin-bottom:6px;letter-spacing:2px}
.evt-d{font-size:12px;line-height:1.8;margin-bottom:12px}
#hpTip{position:fixed;pointer-events:none;z-index:700;background:rgba(4,8,24,.98);border:1px solid rgba(240,200,64,.5);border-radius:7px;padding:7px 10px;font-size:10px;line-height:1.7;display:none;min-width:148px;max-width:200px}
#hpTip.v{display:block}
#onlineWait{position:fixed;inset:0;z-index:800;background:rgba(2,4,10,.95);display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px}
#onlineWait.show{display:flex}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:#020408}
::-webkit-scrollbar-thumb{background:rgba(52,100,160,.4);border-radius:2px}
</style>
</head>
<body>
<canvas id="starsCanvas"></canvas>
<!-- TITLE -->
<div id="titleScreen" class="screen active">
<div class="ti">
<div style="height:12px"></div>
<div class="t-logo">⚔ キングオブキングス ⚔</div>
<div class="t-ver">KINGDOM TACTICS  ver.8.0</div>
<div class="mbox" id="modeBox">
  <div class="slabel">ゲームモード</div>
  <div class="prow">
    <button class="btn btn-gold" onclick="showOfflineSetup()">🗺 オフライン対戦</button>
    <button class="btn btn-blue" onclick="showOnlineMenu()">🌐 オンライン対戦</button>
  </div>
</div>
<div class="mbox" id="offlineBox" style="display:none">
  <div class="slabel">プレイ人数 (2〜6人)</div>
  <div class="prow" style="justify-content:center">
    <button class="pcb" id="pcb2" onclick="setPC(this,2)">2</button>
    <button class="pcb" id="pcb3" onclick="setPC(this,3)">3</button>
    <button class="pcb sel" id="pcb4" onclick="setPC(this,4)">4</button>
    <button class="pcb" id="pcb5" onclick="setPC(this,5)">5</button>
    <button class="pcb" id="pcb6" onclick="setPC(this,6)">6</button>
  </div>
  <div class="slabel">プレイヤー設定</div>
  <div class="pgrid" id="pSetupGrid"></div>
  <div style="display:flex;gap:7px">
    <div style="flex:1;background:rgba(6,14,28,.8);border:1px solid rgba(52,100,160,.3);border-radius:6px;padding:7px">
      <div style="font-size:9px;color:var(--dim);margin-bottom:3px">天候</div>
      <select class="sel2" id="optWeather"><option value="1">あり</option><option value="0">なし</option></select>
    </div>
    <div style="flex:1;background:rgba(6,14,28,.8);border:1px solid rgba(52,100,160,.3);border-radius:6px;padding:7px">
      <div style="font-size:9px;color:var(--dim);margin-bottom:3px">イベント</div>
      <select class="sel2" id="optEvent"><option value="1">あり</option><option value="0">なし</option></select>
    </div>
  </div>
  <button class="btn btn-gold" onclick="startOffline()">▶ ゲーム開始</button>
  <button class="btn" onclick="hideAllBoxes();document.getElementById('modeBox').style.display='flex'">← 戻る</button>
  <div class="note"><span style="color:rgba(240,200,64,.8)">重装→魔法→機動→重装(×3) / モンク→重装(×4) / 魔法→モンク(×4)</span><br>会心10% +30% / フィールド魔法・スケルトン召喚・二刀流・2回攻撃</div>
</div>
<div class="mbox" id="onlineBox" style="display:none">
  <div class="slabel">オンライン対戦</div>
  <button class="btn btn-gold" onclick="createOnlineRoom()">🏠 ルームを作成</button>
  <button class="btn btn-blue" onclick="showJoinRoom()">🚪 ルームに参加</button>
  <button class="btn" onclick="hideAllBoxes();document.getElementById('modeBox').style.display='flex'">← 戻る</button>
  <div class="note" id="onlineStatus">PeerJSで接続します</div>
</div>
<div class="mbox" id="hostBox" style="display:none">
  <div class="slabel">ルーム作成</div>
  <div class="code-d" id="hostCodeDisplay">---</div>
  <div class="note">このコードを参加者に伝えてください</div>
  <div class="rpl" id="hostPlayerList">接続待機中...</div>
  <div class="slabel" style="margin-top:4px">最大人数</div>
  <div class="prow" style="justify-content:center">
    <button class="pcb" id="hpcb2" onclick="setHostPC(this,2)">2</button>
    <button class="pcb" id="hpcb3" onclick="setHostPC(this,3)">3</button>
    <button class="pcb sel" id="hpcb4" onclick="setHostPC(this,4)">4</button>
    <button class="pcb" id="hpcb5" onclick="setHostPC(this,5)">5</button>
    <button class="pcb" id="hpcb6" onclick="setHostPC(this,6)">6</button>
  </div>
  <button class="btn btn-gold" id="hostStartBtn" onclick="startOnlineGame()">▶ ゲーム開始</button>
  <button class="btn btn-red" onclick="closeOnlineRoom()">✕ キャンセル</button>
</div>
<div class="mbox" id="joinBox" style="display:none">
  <div class="slabel">ルームコードを入力</div>

function isMagicUnit(t){return['mage','witch','arcanelord','necromancer','healer','catapult','phoenix'].indexOf(t)>=0;}
/* ===== ゲーム状態 ===== */
function newGS(np,settings){

  for(var i=0;i<ROWS;i++){gs.own.push([]);for(var j=0;j<COLS;j++)gs.own[i].push(-1);}
  for(var i=0;i<np;i++){
    gs.stats.push({killed:0,lost:0,captured:0});
    gs.players.push({id:i,gold:400,alive:true,aiType:settings[i].type,name:settings[i].name,morale:100});

function mkU(gs,type,owner,r,c,spent){return{id:gs.uid++,type:type,owner:owner,row:r,col:c,hp:UDEFS[type].hp,mhp:UDEFS[type].hp,moved:!!spent,attacked:!!spent,status:[],xp:0,level:1};}

function isHuman(pid){return GS&&GS.players[pid]&&GS.players[pid].aiType==='human';}
function allCPU(){if(!GS)return false;return GS.players.filter(function(p){return p.alive;}).every(function(p){return p.aiType!=='human';});}

function effMov(u){return Math.max(1,UDEFS[u.type].mov+(GS.weather.mov||0));}
function mdist(r1,c1,r2,c2){return Math.abs(r1-r2)+Math.abs(c1-c2);}

function addLog(msg,opt){opt=opt||{};if(GS&&GS.log)GS.log.unshift({msg:msg,opt:opt});}
/* ===== 移動範囲 ===== */
function getMovable(gs,unit){
  var mv=effMov(unit),dist={},q=[{r:unit.row,c:unit.col,rem:mv}],res=[];
  dist[unit.row+','+unit.col]=mv;
  var flying=['dragon','phoenix','valkyrie'];
  while(q.length>0){
    var cur=q.shift(),r=cur.r,c=cur.c,rem=cur.rem;
    if(r!==unit.row||c!==unit.col){var occ=uAt(gs,r,c);if(!occ)res.push({r:r,c:c});else continue;}
    if(rem<=0)continue;
    var dirs=[[0,1],[0,-1],[1,0],[-1,0]];
    for(var i=0;i<dirs.length;i++){
      var nr=r+dirs[i][0],nc=c+dirs[i][1];
      if(nr<0||nr>=ROWS||nc<0||nc>=COLS)continue;
      var t=TDEFS[MAP[nr][nc]];
      var cost=(t.cost>=99&&(unit.type==='pirate'||flying.indexOf(unit.type)>=0))?2:t.cost;
      if(cost>=99)continue;
      var nr2=rem-cost;if(nr2<0)continue;
      var key=nr+','+nc,prev=dist[key]!==undefined?dist[key]:-1;
      if(prev>=nr2)continue;
      var occ2=uAt(gs,nr,nc);if(occ2&&occ2.owner!==unit.owner)continue;
      dist[key]=nr2;q.push({r:nr,c:nc,rem:nr2});
    }
  }
  return res;
}
function getAttackable(gs,unit){
  var rng=UDEFS[unit.type].rng,res=[];
  for(var dr=-rng;dr<=rng;dr++)for(var dc=-rng;dc<=rng;dc++){
    var d=Math.abs(dr)+Math.abs(dc);if(d===0||d>rng)continue;
    var nr=unit.row+dr,nc=unit.col+dc;
    if(nr<0||nr>=ROWS||nc<0||nc>=COLS)continue;
    var tgt=uAt(gs,nr,nc);if(tgt&&tgt.owner!==unit.owner)res.push({r:nr,c:nc});
  }
  return res;
}
function getFieldMagicTargets(gs,unit){
  var res=[];
  for(var dr=-2;dr<=2;dr++)for(var dc=-2;dc<=2;dc++){
    if(Math.abs(dr)+Math.abs(dc)>2)continue;
    var nr=unit.row+dr,nc=unit.col+dc;
    if(nr<0||nr>=ROWS||nc<0||nc>=COLS)continue;
    var tgt=uAt(gs,nr,nc);if(tgt&&tgt.owner!==unit.owner)res.push(tgt);
  }
  return res;
}
/* ===== 戦闘 ===== */
function calcAttack(gs,atkId,defId){
  var atk=null,def=null;
  for(var i=0;i<gs.units.length;i++){if(gs.units[i].id===atkId)atk=gs.units[i];if(gs.units[i].id===defId)def=gs.units[i];}
  if(!atk||!def||atk.hp<=0||def.hp<=0)return null;
  var affMult=getAffMult(atk.type,def.type),isCrit=Math.random()<critRate(atk),critMult=isCrit?1.3:1.0;

  var fBonus=formationBonus(gs,atk)?1.08:1.0;
  var defDef=(atk.type==='monk'&&TYPE_CAT[def.type]==='heavy')?Math.floor(UDEFS[def.type].def/2):UDEFS[def.type].def;

  var defRow=def.row,defCol=def.col;

  if((atk.type==='necromancer'||atk.type==='witch')&&def.status.indexOf('cursed')<0&&Math.random()<(atk.type==='necromancer'?0.7:0.5))def.status.push('cursed');

  }

  if(dkill&&def.type==='phoenix'&&gs.phxRevived.indexOf(def.id)<0){def.hp=Math.floor(def.mhp*.4);gs.phxRevived.push(def.id);phxRev=true;dkill=false;}
  var cdmg=0,ckill=false,isCritC=false;

    gs.players[atk.owner].morale=Math.min(150,gs.players[atk.owner].morale+5);

    if(atk.type==='necromancer'){
      var cnt=(gs.summonCounts[atk.id]||0);

  var res={dmg:totalDmg,cdmg:cdmg,dkill:dkill,ckill:ckill,phxRev:phxRev,affMult:affMult,isCrit:isCrit,isCritC:isCritC,isDual:atk.type==='dualblader'&&dmg2>0,atkOwner:atk.owner,defOwner:def.owner,atkType:atk.type,defType:def.type,atkHpBef:atkHpBef,atkHpAft:Math.max(0,atk.hp),defHpBef:defHpBef,defHpAft:Math.max(0,def.hp),atkMhp:atk.mhp,defMhp:def.mhp,atkStatus:atk.status.slice(),defStatus:def.status.slice(),tid:MAP[def.row][def.col]};

function gainXP(gs,u,amt){if(!u||u.hp<=0)return;u.xp=(u.xp||0)+amt;if(u.xp>=100*(u.level||1)){u.xp=0;u.level=(u.level||1)+1;u.mhp+=5;u.hp=Math.min(u.hp+5,u.mhp);addLog(PCOLS[u.owner].name+'の'+UDEFS[u.type].name+'がLv'+u.level+'に！',{sys:true});SFX.levelup();}}

function startOfTurn(gs,pid){

    if(u.status.indexOf('weakened')>=0&&Math.random()<.5)u.status=u.status.filter(function(s){return s!=='weakened';});
    if(u.status.indexOf('enfeebled')>=0&&Math.random()<.5)u.status=u.status.filter(function(s){return s!=='enfeebled';});

function cpuBestTarget(targets,at,atkU){return targets.reduce(function(best,t){var u=uAt(GS,t.r,t.c);if(!u)return best;var bu=best?uAt(GS,best.r,best.c):null;if(!bu)return t;return cpuTargetScore(u,atkU,at)>cpuTargetScore(bu,atkU,at)?t:best;},null);}
function cpuTargetScore(def,atk,at){

  if(at==='genius'){var exp=Math.max(1,effAtk(atk)*aff-UDEFS[def.type].def);sc+=exp>=def.hp?120:exp*1.5;}

function cpuBestDest(movs,pid,at,u){

    if(ncs.length){var mn2=999;for(var i=0;i<ncs.length;i++)mn2=Math.min(mn2,mdist(m.r,m.c,ncs[i].r,ncs[i].c));sc+=(14-mn2)*5;}

function cpuPickProd(pid,at){

  if(at==='cautious'){var prefs=['titan','golem','paladin','knight','healer','monk','soldier'];for(var i=0;i<prefs.length;i++)if(aff.some(function(e){return e[0]===prefs[i];}))return prefs[i];return aff[aff.length-1][0];}
  var enemies=GS.units.filter(function(u){return u.owner!==pid&&u.hp>0;});

  var rng=aff.find(function(e){return['arcanelord','necromancer','catapult','mage'].indexOf(e[0])>=0;});if(rng)return rng[0];

var mapCanvas,mapCtx,minimapCanvas,minimapCtx;
var selUnit=null,moveCells=[],atkCells=[],gMode='';
var animFrame=0,animTimer=null;
function initMap(){
  mapCanvas=document.getElementById('mapCanvas');mapCtx=mapCanvas.getContext('2d');
  mapCanvas.width=COLS*TW;mapCanvas.height=ROWS*TH;
  minimapCanvas=document.getElementById('minimap');minimapCtx=minimapCanvas.getContext('2d');
  animTimer=setInterval(function(){animFrame=(animFrame+1)%60;if(GS)render();},120);
}
function render(){
  if(!mapCtx)return;
  drawMap();drawMinimap();
}
function drawMap(){
  var c=mapCtx,t=animFrame;
  // Terrain
  for(var r=0;r<ROWS;r++){
    for(var col2=0;col2<COLS;col2++){
      var x=col2*TW,y=r*TH,tid=MAP[r][col2],td2=TDEFS[tid];
      var own=GS?GS.own[r][col2]:-1;
      // Base color
      c.fillStyle=td2.col;c.fillRect(x,y,TW,TH);
      // Ownership tint
      if(own>=0){var pc=PCOLS[own].main;c.fillStyle=pc+'28';c.fillRect(x,y,TW,TH);}
      // Terrain texture
      drawTerrainTile(c,x,y,TW,TH,tid,own,t);
      // Border
      c.strokeStyle=td2.bdr;c.lineWidth=1;c.strokeRect(x+.5,y+.5,TW-1,TH-1);
    }
  }
  // Highlight overlays
  if(moveCells.length){
    c.fillStyle='rgba(80,160,255,.28)';
    moveCells.forEach(function(m){c.fillRect(m.r*TH,m.c*TW,TW,TH);c.fillRect(m.c*TW,m.r*TH,TW,TH);});
    // Redraw for correct order
    moveCells.forEach(function(m){c.fillStyle='rgba(80,160,255,.22)';c.fillRect(m.c*TW,m.r*TH,TW,TH);c.strokeStyle='rgba(80,160,255,.7)';c.lineWidth=1.5;c.strokeRect(m.c*TW+1,m.r*TH+1,TW-2,TH-2);});
  }
  if(atkCells.length){
    atkCells.forEach(function(m){c.fillStyle='rgba(231,76,60,.28)';c.fillRect(m.c*TW,m.r*TH,TW,TH);c.strokeStyle='rgba(231,76,60,.7)';c.lineWidth=1.5;c.strokeRect(m.c*TW+1,m.r*TH+1,TW-2,TH-2);});
  }
  if(selUnit){var su=selUnit;c.strokeStyle='rgba(255,220,80,.9)';c.lineWidth=2.5;c.strokeRect(su.col*TW+1,su.row*TH+1,TW-2,TH-2);c.fillStyle='rgba(255,220,80,.12)';c.fillRect(su.col*TW,su.row*TH,TW,TH);}
  // Units
  if(GS)GS.units.forEach(function(u){drawUnit(c,u,t);});
}
function drawTerrainTile(c,x,y,w,h,tid,own,t){
  var cx=x+w/2,cy=y+h/2;
  if(tid===0){// Plain - grass dots
    c.fillStyle='rgba(50,100,30,.5)';
    for(var i=0;i<4;i++){var dx=((i*13+7)%w)*0.8+w*.1,dy=((i*17+3)%h)*0.8+h*.1;c.beginPath();c.arc(x+dx,y+dy,2,0,Math.PI*2);c.fill();}
  }else if(tid===1){// Forest - tree
    c.fillStyle='rgba(20,80,10,.7)';c.beginPath();c.moveTo(cx,y+6);c.lineTo(cx+14,y+h-10);c.lineTo(cx-14,y+h-10);c.fill();
    c.fillStyle='rgba(15,60,8,.7)';c.beginPath();c.moveTo(cx,y+2);c.lineTo(cx+10,y+18);c.lineTo(cx-10,y+18);c.fill();
    c.fillStyle='rgba(80,50,20,.6)';c.fillRect(cx-3,y+h-12,6,10);
  }else if(tid===2){// Mountain
    c.fillStyle='rgba(120,100,60,.6)';c.beginPath();c.moveTo(cx,y+5);c.lineTo(cx+20,y+h-8);c.lineTo(cx-20,y+h-8);c.fill();
    c.fillStyle='rgba(220,220,240,.5)';c.beginPath();c.moveTo(cx,y+5);c.lineTo(cx+7,y+15);c.lineTo(cx-7,y+15);c.fill();
  }else if(tid===3){// Water - animated wave
    var phase=(t*.08)%1;
    c.strokeStyle='rgba(100,180,255,'+(.25+.1*Math.sin(t*.1))+')';c.lineWidth=2;
    c.beginPath();c.moveTo(x+2,cy-4+Math.sin((t+0)*.15)*3);
    c.bezierCurveTo(x+w*.3,cy-8,x+w*.6,cy,x+w-2,cy-4+Math.sin((t+20)*.15)*3);c.stroke();
    c.beginPath();c.moveTo(x+2,cy+6+Math.sin((t+10)*.12)*3);
    c.bezierCurveTo(x+w*.3,cy+2,x+w*.7,cy+10,x+w-2,cy+6+Math.sin((t+30)*.12)*3);c.stroke();
  }else if(tid===4){// City - building
    c.fillStyle='rgba(80,80,120,.55)';c.fillRect(cx-12,y+h-20,10,18);c.fillRect(cx+2,y+h-24,10,22);
    c.fillStyle='rgba(255,220,80,'+(.5+.3*Math.sin(t*.1+(own||0)))+')';
    c.fillRect(cx-10,y+h-18,3,3);c.fillRect(cx-10,y+h-12,3,3);
    c.fillRect(cx+4,y+h-22,3,3);c.fillRect(cx+4,y+h-16,3,3);
    c.fillStyle='rgba(80,80,120,.5)';c.beginPath();c.moveTo(cx-14,y+h-20);c.lineTo(cx-7,y+h-28);c.lineTo(cx,y+h-20);c.fill();
  }else if(tid===5){// Castle
    c.fillStyle='rgba(120,80,40,.65)';c.fillRect(cx-16,y+8,32,h-14);
    c.fillStyle='rgba(90,60,30,.65)';c.fillRect(cx-18,y+6,8,10);c.fillRect(cx-4,y+6,8,10);c.fillRect(cx+10,y+6,8,10);
    c.fillStyle='rgba(30,30,30,.7)';c.fillRect(cx-5,y+h-15,10,13);
    if(own>=0){c.fillStyle=PCOLS[own].main;c.font='bold 11px serif';c.textAlign='center';c.textBaseline='middle';c.fillText('⚑',cx,y+h-22);}
    c.fillStyle='rgba(255,140,0,'+(.4+.3*Math.sin(t*.2+(own||0)*1.5))+')';c.beginPath();c.arc(cx-15,y+10,2.5,0,Math.PI*2);c.fill();c.beginPath();c.arc(cx+15,y+10,2.5,0,Math.PI*2);c.fill();
  }else if(tid===6){// Harbor
    c.fillStyle='rgba(80,120,180,.5)';c.fillRect(cx-14,cy-2,28,10);
    c.strokeStyle='rgba(180,160,100,.6)';c.lineWidth=2;c.beginPath();c.moveTo(cx,cy-12);c.lineTo(cx,cy+8);c.stroke();
    c.fillStyle='rgba(200,180,140,.5)';c.beginPath();c.moveTo(cx,cy-12);c.lineTo(cx+14,cy-4);c.lineTo(cx,cy-2);c.fill();
    c.strokeStyle='rgba(80,140,220,'+(.4+.2*Math.sin(t*.1))+')';c.lineWidth=1.5;
    for(var i=0;i<3;i++){c.beginPath();c.moveTo(x+2,y+h-8-i*5+Math.sin(t*.08+i)*2);c.lineTo(x+w-2,y+h-8-i*5+Math.sin(t*.1+i)*2);c.stroke();}
  }else if(tid===7){// Temple
    c.fillStyle='rgba(80,40,120,.6)';c.fillRect(cx-14,y+10,28,h-16);
    c.fillStyle='rgba(60,30,90,.6)';c.fillRect(cx-18,y+8,6,h-14);c.fillRect(cx+12,y+8,6,h-14);
    var tg=c.createRadialGradient(cx,cy,0,cx,cy,16);tg.addColorStop(0,'rgba(180,100,255,'+(.2+.1*Math.sin(t*.08))+')');tg.addColorStop(1,'transparent');
    c.fillStyle=tg;c.beginPath();c.arc(cx,cy,16,0,Math.PI*2);c.fill();
    c.fillStyle='rgba(200,150,255,.55)';c.font='11px serif';c.textAlign='center';c.textBaseline='middle';c.fillText('⛩',cx,cy);
  }
}
function drawUnit(c,u,t){
  var x=u.col*TW,y=u.row*TH;
  var pc=PCOLS[u.owner];
  var isActive=GS&&u.owner===GS.turn&&isHuman(GS.turn);
  var isDone=u.moved&&u.attacked;
  var isSel=selUnit&&selUnit.id===u.id;
  // Unit circle background
  var ux=x+TW/2,uy=y+TH/2;
  var ug=c.createRadialGradient(ux,uy,2,ux,uy,TW*.38);
  ug.addColorStop(0,isDone?'rgba(40,40,40,.85)':pc.main+'dd');ug.addColorStop(1,isDone?'rgba(20,20,20,.7)':pc.dark+'aa');
  c.fillStyle=ug;c.beginPath();c.arc(ux,uy,TW*.38,0,Math.PI*2);c.fill();
  // Border
  c.strokeStyle=isSel?'#ffee44':(isDone?'#333':pc.light);
  c.lineWidth=isSel?2.5:1.5;c.beginPath();c.arc(ux,uy,TW*.38,0,Math.PI*2);c.stroke();
  // Level star
  if(u.level>1){c.fillStyle='#ffdd44';c.font='bold 7px sans-serif';c.textAlign='left';c.textBaseline='top';c.fillText('★'+u.level,x+2,y+2);}
  // Unit symbol
  var sym=UDEFS[u.type]?UDEFS[u.type].sym:'?';
  c.fillStyle=isDone?'#666':pc.light;
  c.font='bold '+Math.floor(TW*.32)+'px sans-serif';c.textAlign='center';c.textBaseline='middle';
  c.fillText(sym,ux,uy);
  // HP bar
  var hpPct=Math.max(0,u.hp/u.mhp);
  var bw=TW-6,bh=5,bx=x+3,by=y+TH-8;
  c.fillStyle='rgba(0,0,0,.55)';c.fillRect(bx,by,bw,bh);
  var hcol=hpPct>0.5?'#27ae60':hpPct>0.25?'#f0c840':'#e74c3c';
  c.fillStyle=hcol;c.fillRect(bx,by,Math.round(bw*hpPct),bh);
  // Status icons
  var si=0;
  if(u.status){u.status.forEach(function(s){var ic={'cursed':'💀','poisoned':'🟢','weakened':'⬇','enfeebled':'🔻'}[s]||'?';c.font='8px sans-serif';c.textAlign='left';c.fillStyle='#fff';c.fillText(ic,x+2+si*10,y+TH-16);si++;});}
  // Pulse if selected
  if(isSel&&!isDone){var pulse=(Math.sin(t*.25)*.5+.5)*.3;c.strokeStyle='rgba(255,220,80,'+(0.4+pulse)+')';c.lineWidth=1.5;c.setLineDash([3,3]);c.strokeRect(x+2,y+2,TW-4,TH-4);c.setLineDash([]);}
  // Moved overlay
  if(isDone){c.fillStyle='rgba(0,0,0,.38)';c.beginPath();c.arc(ux,uy,TW*.38,0,Math.PI*2);c.fill();}
}
function drawMinimap(){
  if(!minimapCtx||!GS)return;
  var c=minimapCtx,mw=100,mh=75,tw=mw/COLS,th=mh/ROWS;
  c.clearRect(0,0,mw,mh);
  for(var r=0;r<ROWS;r++){for(var col2=0;col2<COLS;col2++){var own=GS.own[r][col2],tc=TDEFS[MAP[r][col2]].col;c.fillStyle=tc;c.fillRect(col2*tw,r*th,tw,th);if(own>=0){c.fillStyle=PCOLS[own].main+'88';c.fillRect(col2*tw,r*th,tw,th);}}}
  GS.units.forEach(function(u){c.fillStyle=PCOLS[u.owner].light;c.fillRect(u.col*tw+1,u.row*th+1,tw-1,th-1);});
  // Viewport indicator
  var ma=document.getElementById('gameMapArea');
  var vx=ma.scrollLeft/TW*tw,vy=ma.scrollTop/TH*th,vw=ma.clientWidth/TW*tw,vh=ma.clientHeight/TH*th;
  c.strokeStyle='rgba(255,255,255,.7)';c.lineWidth=1;c.strokeRect(vx,vy,vw,vh);

var battleCb=null,battleSkip=false;

        setTimeout(function(){rbarEl.style.width=(res.defHpAft/res.defMhp*100)+'%';document.getElementById('bRTxt').textContent=res.defHpAft+'/'+res.defMhp;},200);
        var msg='';
        if(res.isDual)msg+='⚔⚔ 2回攻撃！ ';
        if(res.isCrit)msg+='💥会心一撃！ ';
        if(res.affMult>=4)msg+='✨特効大ダメージ！ ';
        else if(res.affMult>=3)msg+='⚡有利！ ';
        else if(res.affMult<=0.4)msg+='🛡不利… ';
        msg+=UDEFS[res.atkType].name+'の攻撃！ -'+res.dmg+'ダメージ';
        if(res.dkill)msg+=' 【撃破！】';
        if(res.phxRev)msg+=' 🔥不死鳥復活！';
        document.getElementById('bLog').textContent=msg;
      },220);
      setTimeout(function(){lw.classList.remove('do-shake-l');rw.classList.remove('do-flash');rw.classList.remove('do-shake-r');},700);
    },
    function(){
      if(res.cdmg<=0||res.dkill){nextSeq();return;}
      var lw=document.getElementById('bLWrap'),rw=document.getElementById('bRWrap');
      var lx=lw.getBoundingClientRect().x+lw.offsetWidth/2,ly=lw.getBoundingClientRect().y+lw.offsetHeight/2;

      setTimeout(function(){

        SFX.sfxFor(res.defType);
        if(res.isCritC){SFX.crit();showDmgPop('bLDmg','💥'+res.cdmg,rac.light);spawnCrit(lx,ly);}

var onlineMode=false,isHost=false,myPeerIdx=0,myPeer=null,onlineConnections=[],hostNp=4,hostCode='',onlinePlayerCount=0;
function showOnlineMenu(){hideAllBoxes();document.getElementById('onlineBox').style.display='flex';document.getElementById('onlineStatus').textContent=typeof Peer!=='undefined'?'PeerJS 準備完了':'PeerJSが読み込めませんでした';}
function createOnlineRoom(){
  if(typeof Peer==='undefined'){alert('オンライン機能が利用できません');return;}
  var code=String(Math.floor(100+Math.random()*900));hostCode=code;
  var peerId='kok8v'+code;
  try{myPeer=new Peer(peerId);}catch(e){document.getElementById('onlineStatus').textContent='接続エラー: '+e.message;return;}
  myPeer.on('error',function(err){if(err.type==='unavailable-id'){var code2=String(Math.floor(100+Math.random()*900));hostCode=code2;try{myPeer=new Peer('kok8v'+code2);}catch(e2){}}else{showMsg('接続エラー: '+err.message,3000);}});
  myPeer.on('open',function(){
    hideAllBoxes();document.getElementById('hostBox').style.display='flex';
    document.getElementById('hostCodeDisplay').textContent=hostCode;
    document.getElementById('hostStartBtn').disabled=false;
    onlineMode=true;isHost=true;myPeerIdx=0;onlineConnections=[];onlinePlayerCount=1;
    updateHostPlayerList();
  });
  myPeer.on('connection',function(conn){
    if(onlineConnections.length>=hostNp-1){conn.send({type:'full'});return;}
    var seat=onlineConnections.length+1;
    onlineConnections.push({conn:conn,seat:seat,name:'P'+(seat+1)});
    onlinePlayerCount=onlineConnections.length+1;
    conn.on('open',function(){conn.send({type:'assign',seat:seat,code:hostCode,hostNp:hostNp});updateHostPlayerList();});
    conn.on('data',function(data){handleHostMsg(conn,data,seat);});
    conn.on('close',function(){onlineConnections=onlineConnections.filter(function(c){return c.conn!==conn;});onlinePlayerCount=onlineConnections.length+1;updateHostPlayerList();});
    updateHostPlayerList();
  });
}
function updateHostPlayerList(){
  var html='<div style="margin-bottom:4px;color:var(--gold)">参加者:</div>';
  html+='<div>👤 あなた (P1・ホスト)</div>';
  onlineConnections.forEach(function(c){html+='<div>👤 P'+(c.seat+1)+'</div>';});
  var remaining=hostNp-1-onlineConnections.length;
  for(var i=0;i<remaining;i++)html+='<div style="color:var(--dim)">🤖 CPU（空き待ち）</div>';
  document.getElementById('hostPlayerList').innerHTML=html;
}
function setHostPC(btn,n){hostNp=n;document.querySelectorAll('.pcb[id^=hpcb]').forEach(function(b){b.classList.toggle('sel',b===btn);});updateHostPlayerList();}
function startOnlineGame(){
  var settings=[];settings.push({name:'あなた(P1)',type:'human'});
  onlineConnections.forEach(function(c,i){settings.push({name:'P'+(i+2),type:'human'});});
  var aiTypes=['aggressive','cautious','genius'];
  while(settings.length<hostNp)settings.push({name:PCOLS[settings.length].name+'CPU',type:aiTypes[Math.floor(Math.random()*aiTypes.length)]});
  GS=newGS(hostNp,settings);useWeather=true;useEvent=true;
  var gsData=serializeGS();
  onlineConnections.forEach(function(c,i){c.conn.send({type:'start',gs:gsData,np:hostNp,settings:settings,yourSeat:i+1});});
  hideAllBoxes();startGame();
}
function showJoinRoom(){hideAllBoxes();document.getElementById('joinBox').style.display='flex';document.getElementById('joinCodeInp').value='';document.getElementById('joinStatus').textContent='';}
function joinOnlineRoom(){
  var code=document.getElementById('joinCodeInp').value.trim();
  if(code.length!==3){document.getElementById('joinStatus').textContent='3桁のコードを入力';return;}
  if(typeof Peer==='undefined'){document.getElementById('joinStatus').textContent='PeerJSが利用不可';return;}
  document.getElementById('joinStatus').textContent='接続中...';
  try{myPeer=new Peer();}catch(e){document.getElementById('joinStatus').textContent='エラー: '+e.message;return;}
  myPeer.on('open',function(){
    var hostId='kok8v'+code;
    var conn=myPeer.connect(hostId,{reliable:true});
    conn.on('open',function(){document.getElementById('joinStatus').textContent='接続完了！ホストを待機中...';conn.send({type:'join'});});
    conn.on('data',function(data){handleClientMsg(data,conn);});
    conn.on('error',function(e){document.getElementById('joinStatus').textContent='接続失敗: '+e;});
    myPeer.on('error',function(e){document.getElementById('joinStatus').textContent='エラー: '+e.message;});
  });
}
function handleHostMsg(conn,data,seat){
  if(data.type==='end_turn'&&data.gs){GS=deserializeGS(data.gs);advanceTurn();}
  else if(data.type==='action'&&data.kind==='field_magic'){doFieldMagicAction(GS,data.uid);broadcastState();}
}
function handleClientMsg(data,conn){
  if(data.type==='assign'){myPeerIdx=data.seat;document.getElementById('joinStatus').textContent='P'+(myPeerIdx+1)+'として参加！ゲーム開始を待機中...';}
  else if(data.type==='start'){GS=deserializeGS(data.gs);myPeerIdx=data.yourSeat;hideAllBoxes();useWeather=true;useEvent=true;startGame();isMyTurn=(GS.turn===myPeerIdx);}
  else if(data.type==='state'){GS=deserializeGS(data.gs);isMyTurn=(GS.turn===myPeerIdx);render();updUI();if(isMyTurn){showTurnNotif(myPeerIdx);if(GS.over)showGameOver();}}
  else if(data.type==='full'){document.getElementById('joinStatus').textContent='ルームが満員です';}
}
function broadcastState(){if(!isHost)return;var gsData=serializeGS();onlineConnections.forEach(function(c){try{c.conn.send({type:'state',gs:gsData});}catch(e){}});}
function sendToHost(msg){if(!myPeer||isHost)return;if(onlineConnections.length>0){try{onlineConnections[0].conn.send(msg);}catch(e){}}else{var conns=Object.values(myPeer.connections||{});if(conns.length>0&&conns[0].length>0)try{conns[0][0].send(msg);}catch(e){}}}
function serializeGS(){return JSON.parse(JSON.stringify(GS));}
function deserializeGS(data){return JSON.parse(JSON.stringify(data));}
function closeOnlineRoom(){if(myPeer)try{myPeer.destroy();}catch(e){}myPeer=null;onlineConnections=[];onlineMode=false;hideAllBoxes();document.getElementById('modeBox').style.display='flex';}
/* ===== タイトル画面 ===== */
function hideAllBoxes(){['modeBox','offlineBox','onlineBox','hostBox','joinBox'].forEach(function(id){document.getElementById(id).style.display='none';});}
function showOfflineSetup(){hideAllBoxes();document.getElementById('offlineBox').style.display='flex';buildPSetup(4);}
var _pcSel=4;
function setPC(btn,n){_pcSel=n;document.querySelectorAll('.pcb[id^=pcb]').forEach(function(b){b.classList.toggle('sel',b===btn);});buildPSetup(n);}
function buildPSetup(n){
  _pcSel=n;
  var g=document.getElementById('pSetupGrid');g.innerHTML='';
  for(var i=0;i<n;i++){
    var pc=PCOLS[i];
    var div=document.createElement('div');div.className='pcard';
    div.innerHTML='<div class="phead"><span class="pdot" style="background:'+pc.main+'"></span><span style="color:'+pc.light+'">P'+(i+1)+' '+pc.name+'</span></div>'+
      '<select class="sel2" id="pt'+i+'" style="margin-bottom:4px"><option value="human">👤 人間</option><option value="aggressive">⚔ 攻撃型CPU</option><option value="cautious">🛡 慎重型CPU</option><option value="genius">🧠 頭脳型CPU</option></select>';
    if(i>0)div.querySelector('select').value='aggressive';
    g.appendChild(div);
  }
}
function startOffline(){
  var n=_pcSel;
  var settings=[];
  for(var i=0;i<n;i++){
    var t=document.getElementById('pt'+i);
    settings.push({name:PCOLS[i].name,type:t?t.value:'aggressive'});
  }
  var aiTypes=['aggressive','cautious','genius'];
  while(settings.length<2)settings.push({name:PCOLS[settings.length].name,type:aiTypes[Math.floor(Math.random()*aiTypes.length)]});
  GS=newGS(n,settings);
  useWeather=parseInt(document.getElementById('optWeather').value)===1;
  useEvent=parseInt(document.getElementById('optEvent').value)===1;
  onlineMode=false;startGame();
}
function startGame(){
  switchScreen('gameScreen');
  initMap();
  isMyTurn=isHuman(GS.turn);
  document.getElementById('topWeather').textContent=useWeather?GS.weather.icon:'';
  document.getElementById('pauseBtn').style.display=allCPU()?'block':'none';
  render();updUI();
  var inc=startOfTurn(GS,GS.turn);if(inc>0)addLog(GS.players[GS.turn].name+': +'+inc+'G',{sys:true});
  showTurnNotif(GS.turn);
  if(!isHuman(GS.turn))setTimeout(function(){runCPUTurn(GS.turn);},800);
}
function goTitle(){if(myPeer)try{myPeer.destroy();}catch(e){}myPeer=null;onlineConnections=[];onlineMode=false;GS=null;selUnit=null;moveCells=[];atkCells=[];if(animTimer){clearInterval(animTimer);animTimer=null;}isPaused=false;cpuTurnPid=-1;switchScreen('titleScreen');}
function switchScreen(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});document.getElementById(id).classList.add('active');}
/* ===== タッチ・スクロール対応 ===== */
var touchSX=0,touchSY=0,touchPanning=false,panScrollX=0,panScrollY=0;
function initTouchHandlers(){
  var cvs=document.getElementById('mapCanvas'),area=document.getElementById('gameMapArea');
  cvs.addEventListener('touchstart',function(e){
    var t=e.touches[0];touchSX=t.clientX;touchSY=t.clientY;touchPanning=false;
    panScrollX=area.scrollLeft;panScrollY=area.scrollTop;
  },{passive:true});
  cvs.addEventListener('touchmove',function(e){
    if(e.touches.length===1){var t=e.touches[0];var dx=t.clientX-touchSX,dy=t.clientY-touchSY;
      if(Math.abs(dx)>6||Math.abs(dy)>6){touchPanning=true;area.scrollLeft=panScrollX-dx;area.scrollTop=panScrollY-dy;}}
  },{passive:true});
  cvs.addEventListener('touchend',function(e){
    if(touchPanning){touchPanning=false;return;}
    var t=e.changedTouches[0];var dx=Math.abs(t.clientX-touchSX),dy=Math.abs(t.clientY-touchSY);
    if(dx>12||dy>12)return;
    e.preventDefault();
    var area2=document.getElementById('gameMapArea'),rect=cvs.getBoundingClientRect();
    var scaleX=cvs.width/rect.width,scaleY=cvs.height/rect.height;
    var mx=Math.floor((t.clientX-rect.left)*scaleX/TW),my=Math.floor((t.clientY-rect.top)*scaleY/TH);
    if(mx>=0&&mx<COLS&&my>=0&&my<ROWS)onTapPos(my,mx,t.clientX,t.clientY);
  },{passive:false});
  cvs.addEventListener('click',function(e){
    var rect=cvs.getBoundingClientRect();var scaleX=cvs.width/rect.width,scaleY=cvs.height/rect.height;
    var mx=Math.floor((e.clientX-rect.left)*scaleX/TW),my=Math.floor((e.clientY-rect.top)*scaleY/TH);
    if(mx>=0&&mx<COLS&&my>=0&&my<ROWS)onTapPos(my,mx,e.clientX,e.clientY);
  });
  cvs.addEventListener('contextmenu',function(e){e.preventDefault();cancelSel();});
  document.getElementById('minimap').addEventListener('click',function(e){
    var rect=this.getBoundingClientRect();var fx=(e.clientX-rect.left)/rect.width,fy=(e.clientY-rect.top)/rect.height;
    var area2=document.getElementById('gameMapArea');
    area2.scrollLeft=fx*COLS*TW-area2.clientWidth/2;area2.scrollTop=fy*ROWS*TH-area2.clientHeight/2;
  });
}
/* ===== 星空アニメーション (タイトル) ===== */
function initStars(){
  var cvs=document.getElementById('starsCanvas'),c=cvs.getContext('2d');
  var stars=[];function resize(){cvs.width=window.innerWidth;cvs.height=window.innerHeight;stars=[];for(var i=0;i<200;i++)stars.push({x:Math.random()*cvs.width,y:Math.random()*cvs.height,r:Math.random()*1.5+.3,t:Math.random()*Math.PI*2,spd:0.01+Math.random()*.03});}
  resize();window.addEventListener('resize',resize);
  function loop(){c.clearRect(0,0,cvs.width,cvs.height);stars.forEach(function(s){s.t+=s.spd;c.fillStyle='rgba(255,255,255,'+((.4+.5*Math.sin(s.t)).toFixed(2))+')';c.beginPath();c.arc(s.x,s.y,s.r,0,Math.PI*2);c.fill();});requestAnimationFrame(loop);}
  loop();
}
/* ===== 初期化 ===== */
window.addEventListener('DOMContentLoaded',function(){
  initStars();initBBG();initPCanvas();
  document.getElementById('offlineBox').style.display='none';
  document.getElementById('onlineBox').style.display='none';
  document.getElementById('hostBox').style.display='none';
  document.getElementById('joinBox').style.display='none';
  document.getElementById('modeBox').style.display='flex';
  initTouchHandlers();
  // Long-press on map units for tooltip
  document.getElementById('mapCanvas').addEventListener('mousemove',function(e){
    if(!GS)return;
    var rect=this.getBoundingClientRect(),scaleX=this.width/rect.width,scaleY=this.height/rect.height;
    var mx=Math.floor((e.clientX-rect.left)*scaleX/TW),my=Math.floor((e.clientY-rect.top)*scaleY/TH);
    if(mx<0||mx>=COLS||my<0||my>=ROWS){hideHpTip();return;}
    var u=uAt(GS,my,mx);if(u)showHpTip(u,e.clientX,e.clientY);else hideHpTip();
  });
  document.getElementById('mapCanvas').addEventListener('mouseleave',function(){hideHpTip();});
  buildPSetup(4);
});
</script>
